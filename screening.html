// ── COMPONENTS ────────────────────────────────────────────

const Badge = ({ label, color = C.teal }) => (
  <span style={{
    background: color + "20", color, border: `1px solid ${color}44`,
    borderRadius: 4, padding: "2px 8px", fontSize: 10, fontWeight: 700, letterSpacing: 0.4,
  }}>{label}</span>
);

const Alert = ({ type = "warning", children }) => {
  const m = { danger:{bg:C.redL,b:C.red,i:"🚨"}, warning:{bg:C.amberL,b:C.amber,i:"⚠️"}, info:{bg:"#EFF6FF",b:C.teal,i:"ℹ️"}, success:{bg:C.greenL,b:C.green,i:"✅"} };
  const s = m[type];
  return (
    <div style={{background:s.bg,borderLeft:`4px solid ${s.b}`,borderRadius:"0 8px 8px 0",padding:"10px 14px",marginBottom:12,fontSize:13,color:C.dark,display:"flex",gap:8}}>
      <span style={{flexShrink:0}}>{s.i}</span><div>{children}</div>
    </div>
  );
};

const ScoreBtn = ({ val, current, onSelect }) => {
  const labels = { 5:"Excellent", 4:"Good", 3:"Adequate", 2:"Concern", 1:"🚨 Red Flag" };
  const colors = { 5:C.green, 4:C.teal, 3:C.gold, 2:C.amber, 1:C.red };
  const active = current === val;
  return (
    <button onClick={() => onSelect(val)} style={{
      padding:"5px 10px", borderRadius:6, border:`1.5px solid ${colors[val]}`,
      background: active ? colors[val] : "transparent",
      color: active ? C.white : colors[val],
      fontWeight:700, fontSize:11, cursor:"pointer", transition:"all 0.12s",
    }}>{val} — {labels[val]}</button>
  );
};

// ── PANEL SECTION ─────────────────────────────────────────
function PanelSection({ title, subtitle, color, questions, stateKey, data, setData }) {
  const scores = data[stateKey]?.scores || {};
  const notes  = data[stateKey]?.notes  || {};
  const flags  = data[stateKey]?.flags  || {};

  const update = (field, idx, val) =>
    setData(prev => ({ ...prev, [stateKey]: { ...prev[stateKey], [field]: { ...(prev[stateKey]?.[field] || {}), [idx]: val } } }));

  const avg = Object.keys(scores).length > 0
    ? (Object.values(scores).reduce((a,b)=>a+b,0) / Object.keys(scores).length).toFixed(1)
    : null;

  const hasFlag = Object.values(scores).some(s=>s===1) || Object.values(flags).some(Boolean);

  return (
    <div>
      <div style={{background:color,borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{color:C.white,fontWeight:800,fontSize:15}}>{title}</div>
          <div style={{color:C.white+"bb",fontSize:12,marginTop:2}}>{subtitle}</div>
        </div>
        {avg && <div style={{textAlign:"center"}}>
          <div style={{fontSize:26,fontWeight:800,color:C.white}}>{avg}</div>
          <div style={{fontSize:10,color:C.white+"99"}}>AVG / 5</div>
        </div>}
      </div>

      {hasFlag && <Alert type="danger"><strong>Red Flag or child-safety concern flagged.</strong> Escalate to Executive Director before any decision.</Alert>}
      <Alert type="info">Score each answer 1–5 after they respond. Add specific notes with direct quotes. These become the hiring record.</Alert>

      {questions.map((item, idx) => (
        <div key={idx} style={{background:C.white,borderRadius:12,overflow:"hidden",border:`1px solid ${scores[idx]===1||flags[idx]?C.red:C.grayL}`,marginBottom:12,boxShadow:scores[idx]===1?`0 0 0 2px ${C.red}22`:"none"}}>
          <div style={{padding:"11px 15px",background:"#F9FAFB",borderBottom:`1px solid ${C.grayL}`,display:"flex",gap:8,alignItems:"flex-start"}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:color,color:C.white,fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{idx+1}</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.navy,lineHeight:1.5}}>{item.q}</div>
              <div style={{fontSize:11,color:C.teal,marginTop:3}}><strong>WHY WE ASK:</strong> {item.why}</div>
            </div>
          </div>
          <div style={{padding:"12px 15px"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {[5,4,3,2,1].map(v=><ScoreBtn key={v} val={v} current={scores[idx]} onSelect={val=>update("scores",idx,val)}/>)}
            </div>
            <textarea
              value={notes[idx]||""}
              onChange={e=>update("notes",idx,e.target.value)}
              placeholder="Specific notes — quote key phrases, note hesitation or tone..."
              style={{width:"100%",height:65,padding:"8px 12px",border:`1px solid ${C.grayL}`,borderRadius:8,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}
            />
            <label style={{display:"flex",alignItems:"center",gap:8,marginTop:8,cursor:"pointer",fontSize:12,color:C.red,fontWeight:600}}>
              <input type="checkbox" checked={!!flags[idx]} onChange={e=>update("flags",idx,e.target.checked)} style={{width:16,height:16,accentColor:C.red}}/>
              🚨 Flag for child-safety concern — requires ED review
            </label>
          </div>
        </div>
      ))}

      <div style={{marginTop:16}}>
        <div style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:8}}>Panel Recommendation</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["Proceed","Proceed — with noted concerns","Hold — ED review required","Do Not Proceed"].map(opt=>{
            const col = opt==="Proceed"?C.green:opt.includes("concerns")?C.gold:opt.includes("Hold")?C.amber:C.red;
            const active = data[stateKey]?.recommendation === opt;
            return <button key={opt} onClick={()=>setData(prev=>({...prev,[stateKey]:{...prev[stateKey],recommendation:opt}}))} style={{padding:"8px 14px",borderRadius:8,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:active?col:C.grayL,color:active?C.white:C.dark}}>{opt}</button>;
          })}
        </div>
      </div>
    </div>
  );
}

// ── DECISION STAGE ────────────────────────────────────────
function DecisionStage({ role, data, setData }) {
  const def = ROLES[role];
  const [refNotes, setRefNotes] = useState({ ref1: { done: false, notes: "" }, ref2: { done: false, notes: "" } });
  const [edNotes, setEdNotes] = useState("");
  const [decision, setDecision] = useState(null);

  const hasFlags = ["panel1","panel2"].some(k =>
    Object.values(data[k]?.flags || {}).some(Boolean) ||
    Object.values(data[k]?.scores || {}).some(s => s === 1)
  );

  const canOffer = refNotes.ref1.done && refNotes.ref2.done && !hasFlags && data.panel1?.recommendation?.includes("Proceed") && data.panel2?.recommendation?.includes("Proceed");

  return (
    <div>
      {hasFlags && <Alert type="danger"><strong>Child-safety flags recorded.</strong> The Offer button is locked until the Executive Director reviews and clears the flagged answers in writing.</Alert>}

      {/* DSWD Compliance Checklist */}
      <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:4}}>🛡️ DSWD / NACC / RACCO Pre-Offer Compliance Checklist</div>
        <div style={{fontSize:12,color:C.gray,marginBottom:14}}>
          Every item marked <Badge label="HARD BLOCK" color={C.red}/> must be satisfied before generating an offer letter. These are DSWD AO 16 s.2004 requirements for {def.label} positions. HR must verify each — not just rely on the applicant's declaration.
        </div>
        {def.dswd_requirements.map((r, i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"9px 0",borderBottom:i<def.dswd_requirements.length-1?`1px dashed ${C.grayL}`:"none"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:r.hard?700:400,color:C.dark}}>{r.req}</div>
              <div style={{fontSize:11,color:C.gray,marginTop:2}}>{r.basis}</div>
            </div>
            {r.hard && <Badge label="HARD BLOCK" color={C.red}/>}
          </div>
        ))}
      </div>

      {/* Reference Checks */}
      <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>📞 Reference Checks — Both Required</div>
        {["ref1","ref2"].map((key, i) => (
          <div key={key} style={{background:"#F9FAFB",borderRadius:10,padding:14,marginBottom:10,border:`1px solid ${refNotes[key].done?C.green:C.grayL}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy}}>Reference {i+1}</div>
              <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                <input type="checkbox" checked={refNotes[key].done}
                  onChange={e=>setRefNotes(prev=>({...prev,[key]:{...prev[key],done:e.target.checked}}))}
                  style={{width:16,height:16,accentColor:C.green}}/>
                <span style={{fontSize:12,fontWeight:600,color:C.green}}>Call Completed</span>
              </label>
            </div>
            <textarea value={refNotes[key].notes}
              onChange={e=>setRefNotes(prev=>({...prev,[key]:{...prev[key],notes:e.target.value}}))}
              placeholder={`Reference ${i+1} call notes — how long they know the applicant, what they said about character and work with children or in relevant role, any concerns...`}
              style={{width:"100%",height:75,padding:"8px 12px",border:`1px solid ${C.grayL}`,borderRadius:8,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
      </div>

      {/* Summary */}
      <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:14}}>📊 Screening Summary</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {[
            { label:"Panel 1 Recommendation", value: data.panel1?.recommendation || "Pending" },
            { label:"Panel 1 Avg Score", value: Object.keys(data.panel1?.scores||{}).length > 0 ? (Object.values(data.panel1.scores).reduce((a,b)=>a+b,0)/Object.keys(data.panel1.scores).length).toFixed(1)+" / 5" : "—" },
            { label:"Panel 2 Recommendation", value: data.panel2?.recommendation || "Pending" },
            { label:"Panel 2 Avg Score", value: Object.keys(data.panel2?.scores||{}).length > 0 ? (Object.values(data.panel2.scores).reduce((a,b)=>a+b,0)/Object.keys(data.panel2.scores).length).toFixed(1)+" / 5" : "—" },
          ].map((s,i)=>{
            const good = s.value.includes("Proceed") || parseFloat(s.value) >= 3.5;
            return (
              <div key={i} style={{background:s.value==="Pending"?"#F9FAFB":good?C.greenL:C.redL,borderRadius:10,padding:12,border:`1px solid ${s.value==="Pending"?C.grayL:good?C.green:C.red}33`}}>
                <div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:13,fontWeight:700,color:s.value==="Pending"?C.gray:good?C.green:C.red}}>{s.value}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Final Decision */}
      <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:4}}>⭐ Executive Director — Final Decision</div>
        <div style={{fontSize:12,color:C.gray,marginBottom:14}}>
          The Executive Director makes all final hiring decisions. Jackson presents the complete file.
        </div>
        <textarea value={edNotes} onChange={e=>setEdNotes(e.target.value)}
          placeholder="ED notes and rationale..."
          style={{width:"100%",height:70,padding:"9px 12px",border:`1px solid ${C.grayL}`,borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:12}}/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[
            { label:"✅ OFFER — Proceed with Conditional Offer", color:C.green, disabled:!canOffer },
            { label:"⏸️ HOLD — More Information Needed", color:C.amber, disabled:false },
            { label:"❌ DO NOT HIRE — File Closed", color:C.red, disabled:false },
          ].map(opt=>(
            <button key={opt.label} onClick={()=>!opt.disabled&&setDecision(opt.label)}
              disabled={opt.disabled}
              style={{padding:"10px 16px",borderRadius:8,border:"none",fontWeight:700,fontSize:12,cursor:opt.disabled?"not-allowed":"pointer",background:decision===opt.label?opt.color:C.grayL,color:decision===opt.label?C.white:C.dark,opacity:opt.disabled?0.45:1}}>
              {opt.label}
            </button>
          ))}
        </div>
        {!canOffer && <div style={{fontSize:12,color:C.amber,marginTop:10}}>⚠️ Offer button locked until both reference checks are complete, all flags are cleared by ED, and both panels recommend Proceed.</div>}
        {decision?.includes("OFFER") && <Alert type="success" style={{marginTop:16}}><strong>Proceed with Conditional Offer.</strong> Generate offer letter → ED signature → deliver with pre-employment requirements checklist → 7-day deadline → schedule Day 1 only after NBI Clearance physically verified.</Alert>}
        {decision?.includes("DO NOT HIRE") && <Alert type="danger" style={{marginTop:16}}><strong>File closed.</strong> File screening records. Send courteous neutral rejection. Retain per data retention policy. Do not state specific rejection reasons in writing without legal guidance.</Alert>}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────
function ScreeningSystem() {
  const [selectedRole, setSelectedRole] = useState(null);
  const [stage, setStage] = useState(0);
  const [data, setData] = useState({});

  const def = selectedRole ? ROLES[selectedRole] : null;

  const STAGES = def ? [
    { id:"disq",    label:"Disqualifier Check",    icon:"🛡️" },
    { id:"panel1",  label:"Interview 1 — HR",       icon:"🎙️" },
    { id:"panel2",  label:`Interview 2 — ${def.interview2_panel.split('/')[0].trim()}`, icon:"👥" },
    { id:"decision",label:"Screening Decision",     icon:"⭐" },
  ] : [];

  const canAdvance = (i) => {
    if (i === 0) return !!data.disqCleared;
    if (i === 1) return !!data.panel1?.recommendation;
    if (i === 2) return !!data.panel2?.recommendation;
    return true;
  };

  if (!selectedRole) {
    return (
      <div style={{minHeight:"100vh",background:C.cream,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{background:C.navy,padding:"20px 24px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:800,color:C.white,letterSpacing:-0.3}}>Safe Haven Screening System</div>
          <div style={{fontSize:12,color:C.teal2,marginTop:4,letterSpacing:0.5}}>DSWD · NACC/RACCO · DOLE COMPLIANT · ALL ROLES</div>
        </div>
        <div style={{padding:24,maxWidth:700,margin:"0 auto"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:6}}>Select the Role You Are Screening For</div>
          <div style={{fontSize:13,color:C.gray,marginBottom:20}}>Each role loads its own qualification standards, DSWD/NACC/RACCO compliance requirements, disqualifiers, and interview question banks.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
            {Object.values(ROLES).map(r => (
              <div key={r.id} onClick={()=>{setSelectedRole(r.id);setStage(0);setData({});}}
                style={{background:C.white,borderRadius:14,padding:20,cursor:"pointer",border:`2px solid ${C.grayL}`,transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=r.color;e.currentTarget.style.boxShadow=`0 4px 16px ${r.color}22`;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.grayL;e.currentTarget.style.boxShadow="none";}}>
                <div style={{fontSize:28,marginBottom:8}}>{r.icon}</div>
                <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:4}}>{r.label}</div>
                <div style={{fontSize:11,color:C.gray,lineHeight:1.5,marginBottom:10}}>{r.subtitle}</div>
                <div style={{background:r.color,color:C.white,borderRadius:6,padding:"4px 10px",fontSize:10,fontWeight:700,display:"inline-block"}}>Start Screening →</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:24,background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:16}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>What Each Role Includes</div>
            {Object.values(ROLES).map(r => (
              <div key={r.id} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:`1px dashed ${C.grayL}`,alignItems:"flex-start"}}>
                <span style={{fontSize:16,flexShrink:0}}>{r.icon}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:C.navy}}>{r.label}: </span>
                  <span style={{fontSize:12,color:C.gray}}>{r.dswd_requirements.filter(r=>r.hard).length} hard DSWD blocks · {r.hard_disqualifiers.length} disqualifiers · {r.interview1_questions.length + r.interview2_questions.length} interview questions · Panel 2: {r.interview2_panel}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:C.cream,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{background:C.navy,padding:"14px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{width:38,height:38,borderRadius:10,background:def.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{def.icon}</div>
          <div>
            <div style={{color:C.white,fontWeight:800,fontSize:16}}>Safe Haven — {def.label} Screening</div>
            <div style={{color:C.teal2,fontSize:11}}>{def.subtitle} · {def.moo_qualifications.substring(0,80)}...</div>
          </div>
          <button onClick={()=>setSelectedRole(null)} style={{marginLeft:"auto",background:"none",border:`1px solid rgba(255,255,255,0.2)`,color:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>← Change Role</button>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {STAGES.map((s,i)=>(
            <button key={s.id} onClick={()=>(i===0||canAdvance(i-1))&&setStage(i)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:7,border:"none",cursor:(i===0||canAdvance(i-1))?"pointer":"not-allowed",background:stage===i?def.color:"rgba(255,255,255,0.1)",color:C.white,opacity:(i===0||canAdvance(i-1))?1:0.45,fontWeight:stage===i?700:400,fontSize:12,transition:"all 0.15s"}}>
              <span>{s.icon}</span><span>{s.label}</span>
              {canAdvance(i)&&i<stage&&<span style={{color:"#4ADE80",fontSize:10}}>✓</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>

        {/* Stage 0: Disqualifier Check */}
        {stage === 0 && (
          <div>
            <Alert type="danger">
              <strong>Complete this check before any interview.</strong> If any hard disqualifier applies, stop immediately and notify the Executive Director. Do not proceed with the interview.
            </Alert>
            <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:4}}>🛡️ Hard Disqualifiers — {def.label}</div>
              <div style={{fontSize:12,color:C.gray,marginBottom:14}}>Check each one. If ANY applies to this applicant, stop here.</div>
              {def.hard_disqualifiers.map((d,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"center",padding:"9px 12px",marginBottom:6,background:C.redL,borderRadius:8,border:`1px solid ${C.red}22`}}>
                  <span style={{color:C.red,flexShrink:0}}>✗</span>
                  <span style={{fontSize:12,color:C.dark}}>{d}</span>
                </div>
              ))}
            </div>

            <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:14}}>✅ Pre-Interview Verification</div>
              {def.dswd_requirements.map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 0",borderBottom:i<def.dswd_requirements.length-1?`1px dashed ${C.grayL}`:"none"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:r.hard?600:400,color:C.dark}}>{r.req}</div>
                    <div style={{fontSize:11,color:C.gray,marginTop:2}}>{r.basis}</div>
                  </div>
                  {r.hard && <Badge label="HARD BLOCK" color={C.red}/>}
                </div>
              ))}
            </div>

            <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.grayL}`,padding:20}}>
              <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:10}}>Confirm before proceeding:</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button onClick={()=>setData(prev=>({...prev,disqCleared:"clear"}))} style={{padding:"10px 20px",borderRadius:8,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",background:data.disqCleared==="clear"?C.green:C.grayL,color:data.disqCleared==="clear"?C.white:C.dark}}>
                  ✅ No disqualifiers apply — proceed to interviews
                </button>
                <button onClick={()=>setData(prev=>({...prev,disqCleared:"stop"}))} style={{padding:"10px 20px",borderRadius:8,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",background:data.disqCleared==="stop"?C.red:C.grayL,color:data.disqCleared==="stop"?C.white:C.dark}}>
                  🚫 Disqualifier found — stop and notify ED
                </button>
              </div>
              {data.disqCleared==="stop" && <Alert type="danger" style={{marginTop:12}}><strong>Application stopped.</strong> Notify the Executive Director immediately. Do not conduct any interview. File the screening record. Send a neutral communication to the applicant.</Alert>}
            </div>
          </div>
        )}

        {/* Stage 1: Panel 1 */}
        {stage === 1 && (
          <PanelSection
            title="Interview 1 — HR & Values Panel"
            subtitle="Jackson leads. Values, safeguarding awareness, character, self-regulation."
            color={C.gold}
            questions={def.interview1_questions}
            stateKey="panel1"
            data={data}
            setData={setData}
          />
        )}

        {/* Stage 2: Panel 2 */}
        {stage === 2 && (
          <PanelSection
            title={`Interview 2 — ${def.interview2_panel}`}
            subtitle="Technical, practical, and role-specific assessment."
            color={def.color}
            questions={def.interview2_questions}
            stateKey="panel2"
            data={data}
            setData={setData}
          />
        )}

        {/* Stage 3: Decision */}
        {stage === 3 && <DecisionStage role={selectedRole} data={data} setData={setData}/>}

        {/* Navigation */}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
          <button onClick={()=>setStage(Math.max(0,stage-1))} disabled={stage===0} style={{padding:"10px 18px",borderRadius:8,border:`1px solid ${C.grayL}`,background:"none",cursor:stage===0?"not-allowed":"pointer",fontWeight:600,fontSize:13,color:stage===0?C.gray:C.dark}}>← Previous</button>
          {stage < STAGES.length-1 && (
            <button onClick={()=>canAdvance(stage)&&setStage(stage+1)} disabled={!canAdvance(stage)} style={{padding:"10px 20px",borderRadius:8,border:"none",background:canAdvance(stage)?def.color:C.gray,color:C.white,fontWeight:700,fontSize:13,cursor:canAdvance(stage)?"pointer":"not-allowed"}}>
              Next: {STAGES[stage+1]?.label} →
            </button>
          )}
        </div>
      </div>

      <div style={{borderTop:`1px solid ${C.grayL}`,padding:"10px 20px",background:C.white,fontSize:11,color:C.gray,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <span>Safe Haven Screening System · DSWD AO 16 s.2004 · NACC/RACCO · DOLE · MOO v.11.18.2025</span>
        <span style={{color:C.red,fontWeight:600}}>⚠️ All decisions require human HR and ED review. AI output is advisory only.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ScreeningSystem,null));
</script>
</body>
</html>
