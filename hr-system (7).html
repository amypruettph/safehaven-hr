<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Haven HR System</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

// ── Safe Haven API Configuration ──────────────────────────────
// Replace sk-ant-... with your Anthropic API key
const SAFE_HAVEN_API_KEY = "sk-ant-...";

// ═══════════════════════════════════════════════════════════════════
// SAFE HAVEN CHILDREN'S HOME FOUNDATION, INC.
// Complete HR System — Phase 1
// Screening → Onboarding → Records → Performance → Training →
// Discipline → Exit → AI Assistant
// Sprouts PH integration: timekeeping & payroll remain in Sprouts
// Data layer: Google Sheets + Google Drive (Phase 2 → Supabase)
// ═══════════════════════════════════════════════════════════════════

// ── Design tokens ───────────────────────────────────────────────
const T = {
  navy:    "#1B2B4B",
  navyMid: "#243660",
  teal:    "#2A7A7A",
  teal2:   "#3AADAD",
  gold:    "#C8941A",
  gold2:   "#F0C060",
  cream:   "#F7F4EE",
  white:   "#FFFFFF",
  red:     "#B83232",
  redL:    "#FDEAEA",
  green:   "#1A6B3C",
  greenL:  "#EAFAF1",
  amber:   "#C47A15",
  amberL:  "#FEF6E4",
  gray:    "#6B7280",
  grayL:   "#E5E7EB",
  dark:    "#374151",
  ink:     "#1A1A2E",
};

// ── Navigation modules ──────────────────────────────────────────
const MODULES = [
  { id:"dashboard",    icon:"🏠", label:"Dashboard",        group:"main" },
  { id:"recruitment",  icon:"🔍", label:"Recruitment",      group:"hiring" },
  { id:"onboarding",   icon:"📋", label:"Onboarding",       group:"hiring" },
  { id:"employees",    icon:"👥", label:"Employee Records",  group:"people" },
  { id:"performance",  icon:"📈", label:"Performance",       group:"people" },
  { id:"training",     icon:"🎓", label:"Training",          group:"people" },
  { id:"discipline",   icon:"⚖️", label:"Discipline",        group:"compliance" },
  { id:"exit",         icon:"🚪", label:"Exit & Offboarding",group:"compliance" },
  { id:"assistant",    icon:"🤖", label:"HR Assistant",      group:"tools" },
  { id:"settings",     icon:"⚙️", label:"Settings",          group:"tools" },
];

const GROUPS = {
  main:       { label: "" },
  hiring:     { label: "HIRING" },
  people:     { label: "PEOPLE" },
  compliance: { label: "COMPLIANCE" },
  tools:      { label: "TOOLS" },
};

// ── Shared UI ───────────────────────────────────────────────────
const Badge = ({ label, color = T.teal, size = "sm" }) => (
  <span style={{
    background: color + "22", color, border: `1px solid ${color}44`,
    borderRadius: 4, padding: size === "lg" ? "4px 12px" : "2px 8px",
    fontSize: size === "lg" ? 12 : 10, fontWeight: 700, letterSpacing: 0.4,
    whiteSpace: "nowrap",
  }}>{label}</span>
);

const Alert = ({ type = "info", children }) => {
  const m = {
    danger:  { bg: T.redL,   border: T.red,   icon: "🚨" },
    warning: { bg: T.amberL, border: T.amber, icon: "⚠️" },
    info:    { bg: "#EFF6FF", border: T.teal,  icon: "ℹ️" },
    success: { bg: T.greenL, border: T.green, icon: "✅" },
  };
  const s = m[type] || m.info;
  return (
    <div style={{ background: s.bg, borderLeft: `4px solid ${s.border}`, borderRadius: "0 8px 8px 0", padding: "10px 14px", marginBottom: 12, fontSize: 13, color: T.dark, display: "flex", gap: 8 }}>
      <span style={{ flexShrink: 0 }}>{s.icon}</span><div>{children}</div>
    </div>
  );
};

const Card = ({ children, style = {} }) => (
  <div style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.grayL}`, padding: 20, marginBottom: 16, ...style }}>
    {children}
  </div>
);

const SectionTitle = ({ icon, title, subtitle, color = T.navy }) => (
  <div style={{ marginBottom: 20 }}>
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
      <div style={{ width: 38, height: 38, borderRadius: 10, background: color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{icon}</div>
      <div>
        <h2 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: T.navy, letterSpacing: -0.3 }}>{title}</h2>
        {subtitle && <p style={{ margin: 0, fontSize: 12, color: T.gray, marginTop: 2 }}>{subtitle}</p>}
      </div>
    </div>
    <div style={{ height: 2, background: `linear-gradient(90deg, ${color}, transparent)`, borderRadius: 2, marginTop: 8 }} />
  </div>
);

const Btn = ({ children, onClick, color = T.teal, outline = false, size = "md", disabled = false }) => (
  <button onClick={onClick} disabled={disabled} style={{
    padding: size === "sm" ? "6px 12px" : size === "lg" ? "13px 24px" : "9px 18px",
    borderRadius: 8, border: outline ? `1.5px solid ${color}` : "none",
    background: disabled ? T.gray : outline ? "transparent" : color,
    color: outline ? color : T.white,
    fontWeight: 700, fontSize: size === "sm" ? 12 : 13,
    cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.15s",
    opacity: disabled ? 0.6 : 1,
  }}>{children}</button>
);

const Field = ({ label, children, hint, required }) => (
  <div style={{ marginBottom: 14 }}>
    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.dark, marginBottom: 5 }}>
      {label} {required && <span style={{ color: T.red }}>*</span>}
    </label>
    {children}
    {hint && <div style={{ fontSize: 11, color: T.gray, marginTop: 3, lineHeight: 1.5 }}>{hint}</div>}
  </div>
);

const Input = ({ value, onChange, placeholder, type = "text", ...rest }) => (
  <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${T.grayL}`, borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none", color: T.dark, boxSizing: "border-box" }}
    {...rest} />
);

const Select = ({ value, onChange, children }) => (
  <select value={value} onChange={onChange}
    style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${T.grayL}`, borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none", color: T.dark, background: T.white }}>
    {children}
  </select>
);

const Textarea = ({ value, onChange, placeholder, rows = 4 }) => (
  <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
    style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${T.grayL}`, borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none", color: T.dark, resize: "vertical", lineHeight: 1.6, boxSizing: "border-box" }} />
);

// ── Compliance tag strip ─────────────────────────────────────────
const ComplianceTags = ({ tags }) => (
  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
    {tags.map(t => <Badge key={t.label} label={t.label} color={t.color || T.teal} />)}
  </div>
);

// MODULE: DASHBOARD
// ═══════════════════════════════════════════════════════════════════

  const alerts = [

    { type: "danger",  msg: "💰 HP Pay Restructure July 15 — 4 Contract Addenda must be signed by July 14. Sprouts update required before payroll.", action: "View Settings" },
    { type: "danger",  msg: "⚠️ Jessa Lozada Day 164 — DOLE Art. 296 Day 180 deadline is July 17. Non-regularization decision needed NOW.", action: "View Performance" },
    { type: "warning", msg: "📋 Remie Torregosa new contract effective July 15 — Amy must sign. Performance bonus system starting this month.", action: "View Employees" },
    { type: "warning", msg: "📋 Noribel Fantilanan offer rate needs update from PHP 13,000 to PHP 14,300 before August 27 start date.", action: "View Employees" },
    { type: "warning", msg: "🎓 Kate Desiree Virgo — Interview 1 TODAY July 1 at 2PM Google Meet. References need to be called before the interview.", action: "View Recruitment" },
    { type: "info",    msg: "✅ Arianne Joy Garcia — Assessment 82%, Interview 1 confirmed July 3 at 10AM in person at Safe Haven.", action: "View Recruitment" },
    { type: "info",    msg: "📋 Mercevet Barera — Assessment sent. Physical discipline stance must be clarified in interview.", action: "View Recruitment" },
  ];

  const stats = [
    { num: "9",  label: "Active Staff", icon: "👥", color: T.navy },
    { num: "4",  label: "HP On Probation", icon: "📋", color: T.amber },
    { num: "8",  label: "Action Items Today", icon: "🚨", color: T.red },
    { num: "3",  label: "Candidates in Pipeline", icon: "🔍", color: T.teal },
  ];

  const quickLinks = [
    { icon: "🔍", label: "Start Screening",     sub: "New applicant intake",       mod: "recruitment" },
    { icon: "📋", label: "New Hire Checklist",   sub: "Begin onboarding",           mod: "onboarding" },
    { icon: "📈", label: "Probationary Review",  sub: "30/60/90/Month 5",           mod: "performance" },
    { icon: "⚖️", label: "Issue an NTE",          sub: "Due process workflow",       mod: "discipline" },
    { icon: "🎓", label: "Log Training",          sub: "Record completion",          mod: "training" },
    { icon: "🚪", label: "Exit Clearance",        sub: "Offboard an employee",       mod: "exit" },
    { icon: "🤖", label: "Ask HR Assistant",      sub: "Policy questions",           mod: "assistant" },
    { icon: "👥", label: "Employee Records",      sub: "View 201 index",             mod: "employees" },
  ];

  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, ${T.navy} 0%, ${T.teal} 100%)`, borderRadius: 16, padding: "24px 28px", marginBottom: 24, color: T.white }}>
        <div style={{ fontSize: 11, opacity: 0.7, letterSpacing: 1, marginBottom: 6 }}>SAFE HAVEN CHILDREN'S HOME FOUNDATION, INC.</div>
        <h1 style={{ margin: "0 0 6px", fontSize: 24, fontWeight: 800, letterSpacing: -0.5 }}>HR Management System</h1>
        <p style={{ margin: 0, fontSize: 13, opacity: 0.8 }}>DOLE · DSWD · NACC/RACCO · Sprouts PH · RA 10173 · RA 11313 · Phase 1</p>
        <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
          {["DOLE Compliant", "DSWD AO 16", "NACC/RACCO Ready", "Sprouts Integrated", "Phase 1 — Google Drive Data Layer"].map(t => (
            <span key={t} style={{ background: "rgba(255,255,255,0.15)", color: T.white, borderRadius: 20, padding: "3px 10px", fontSize: 10, fontWeight: 700 }}>{t}</span>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>

            <div style={{ fontSize: 11, color: T.gray, fontWeight: 600 }}>{s.label}</div>
          </Card>
        ))}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.gray, letterSpacing: 1, marginBottom: 12 }}>COMPLIANCE ALERTS</div>

                onMouseEnter={e => { e.currentTarget.style.borderColor = T.teal; e.currentTarget.style.boxShadow = "0 4px 12px rgba(42,122,122,0.1)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = T.grayL; e.currentTarget.style.boxShadow = "none"; }}>
                <div style={{ fontSize: 20, marginBottom: 4 }}>{l.icon}</div>

              </div>
            ))}

          <div style={{ marginTop: 12, background: T.navy + "08", borderRadius: 10, padding: 12, border: `1px solid ${T.navy}15`, fontSize: 11, color: T.gray, lineHeight: 1.7 }}>

// ═══════════════════════════════════════════════════════════════════
// MODULE: RECRUITMENT
// ═══════════════════════════════════════════════════════════════════
function Recruitment() {
  const [tab, setTab] = useState("tracker");
  const [aiResult, setAiResult] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [applicantText, setApplicantText] = useState("");
  const [selectedRole, setSelectedRole] = useState("houseparent");
  const [showAddModal, setShowAddModal] = useState(false);
  const [selectedApplicant, setSelectedApplicant] = useState(null);
  const [newApplicant, setNewApplicant] = useState({name:"",role:"House Parent I",date:"",status:"Application received",score:"",aiScore:"",note:""});
  const [applicantList, setApplicantList] = useState([
    { name: "Arianne Joy Garcia",         role: "House Parent I",    date: "Jun 28", status: "Interview 1 completed — Jul 3 ✓", score: 82, aiScore: 8, flag: false, note: "PRIORITY. Strong on discipline + disclosure. Clarify Kids Attendant scope + housing plan." },
    { name: "Kate Desiree Virgo",          role: "House Parent I",    date: "Jun 29", status: "Interview 1 completed — Jul 1 ✓", score: null, aiScore: 7, flag: true, note: "⚠️ Licensed RSW. Possible role mismatch. Check with Amy on SW position." },
    { name: "Mercevet 'Beth' Barera",      role: "House Parent I",    date: "Jun 26", status: "Interview 1 scheduled — Mon 9AM", score: 82, aiScore: 6, flag: true, note: "⚠️ Discipline language needs clarification. Partial availability. Recent surgery." },
    { name: "Maavelina Campanilla Cariño", role: "House Parent I",    date: "Jun 30", status: "Assessment sent — awaiting result", score: null, aiScore: 8, flag: false, note: "References are relatives — request non-relative refs before proceeding." },
    { name: "Merriel Amarille",            role: "House Parent I",    date: "Jun 30", status: "Assessment sent — awaiting result", score: null, aiScore: 8, flag: false, note: "Fresh grad BSHS. Strong answers. References are relatives — request non-relative refs." },
    { name: "Sanita Orlandez",             role: "Cook",              date: "Jun 30", status: "On hold — verify birthdate", score: null, aiScore: 5, flag: true, note: "⚠️ Birthdate listed as 2026 — data entry error. Confirm before proceeding." },
    { name: "Rechee Bignotia",             role: "Social Worker",     date: "Jul 3",  status: "On hold — verify SW position with Amy", score: null, aiScore: 9, flag: false, note: "Licensed RSW PRC #0051648. Excellent answers. Verify if SW position exists." },
  ]);

  const addApplicant = () => {
    if (!newApplicant.name.trim()) return;
    const today = new Date().toLocaleDateString("en-PH",{month:"short",day:"numeric"});
    setApplicantList(prev => [...prev, {...newApplicant, date: newApplicant.date || today, flag: false}]);
    setNewApplicant({name:"",role:"House Parent I",date:"",status:"Application received",score:"",aiScore:"",note:""});
    setShowAddModal(false);
  };

  const exportList = () => {
    const rows = [["Name","Role","Date","Status","Assessment %","AI Score","Notes"]];
    applicantList.forEach(a => rows.push([a.name,a.role,a.date,a.status,a.score||"",a.aiScore||"",a.note||""]));
    const csv = rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("
");
    const blob = new Blob([csv],{type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="SafeHaven_Applicants.csv"; a.click();
  };

  const ROLE_LABELS = { houseparent:"House Parent", socialworker:"Social Worker / RSW", admin:"Admin / Finance / HR", teacher:"Teacher / ALS", cook:"Cook / Kitchen" };

  const runScreen = async () => {
    if (!applicantText.trim()) return;
    setAiLoading(true); setAiResult("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": SAFE_HAVEN_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1200,
          messages: [{ role: "user", content: `You are a child-safe HR screener for A Safe Haven Children's Home Foundation, Inc. — a DSWD-accredited residential child care facility in Davao City, Philippines.\n\nRole being screened: ${ROLE_LABELS[selectedRole]}\n\nSafe Haven values: Love, Joy, Excellence, Faithfulness, Respect.\nAll staff must comply with DSWD AO 16 s.2004, RA 7610, RA 10173, RA 11313.\nChild protection is non-negotiable. NBI Clearance is a hard requirement.\n\nReview this applicant's written response and provide:\n1. SUITABILITY SCORE (1-10) for child-safe ${ROLE_LABELS[selectedRole]} work\n2. GREEN FLAGS — positive indicators (specific quotes)\n3. RED FLAGS — concerning signals or gaps (specific quotes or absences)\n4. CHILD SAFETY SIGNALS — anything suggesting risk or strength in child protection awareness\n5. VERIFICATION NEEDED — what HR must manually confirm\n6. RECOMMENDED NEXT STEP: "Proceed to Aptitude Test" / "Hold — clarify first" / "Do Not Proceed"\n7. RATIONALE (2-3 sentences)\n\nBe firm. Quote actual words. Do not soften red flags.\n\nApplicant Response:\n${applicantText}` }]
        })
      });
      const d = await res.json();
      setAiResult(d.content?.[0]?.text || "No response.");
    } catch { setAiResult("Connection error. Try again."); }
    setAiLoading(false);
  };

  const TABS = [
    { id:"tracker", label:"📊 Applicant Tracker" },
    { id:"requisition", label:"📄 Job Requisition" },
    { id:"aiscreen", label:"🤖 AI Screener" },
    { id:"checklist", label:"✅ Pre-Employment" },
  ];

  const sampleApplicants = [
    { name: "Arianne Joy Garcia",         role: "House Parent I",    date: "Jun 28", status: "Interview 1 — Jul 3 10AM IN PERSON ✓", score: 82, aiScore: 8, flag: false, note: "PRIORITY. 82% assessment. Strong on discipline + disclosure. Clarify Kids Attendant scope + housing plan." },
    { name: "Kate Desiree Virgo",          role: "House Parent I",    date: "Jun 29", status: "Interview 1 — Jul 1 2PM Google Meet ✓", score: null, aiScore: 7, flag: true, note: "⚠️ Licensed RSW — possible role mismatch. Disclosure answer shows SW thinking, not HP protocol. References called?" },
    { name: "Mercevet 'Beth' Barera",      role: "House Parent I",    date: "Jun 27", status: "Assessment sent — awaiting result", score: null, aiScore: 6, flag: true, note: "⚠️ CAUTION: 'discipline like my own children' flag. Clarify physical discipline stance FIRST in interview." },
    { name: "Maavelina Campanilla Cariño", role: "House Parent I",    date: "Jun 30", status: "Application form sent — pending", score: null, aiScore: null, flag: false, note: "Emailed directly. Sent Google Form link. Awaiting submission." },
    { name: "Rechee (surname TBD)",        role: "House Parent I",    date: "Jun 30", status: "Application form resent (broken link fixed)", score: null, aiScore: null, flag: false, note: "Got broken apply.html link. Resent correct Google Form link." },
    { name: "Walk-in Candidate",           role: "House Parent I",    date: "Jul 1",  status: "Walk-in — route through process", score: null, aiScore: null, flag: false, note: "Send Google Form, get references. Do not interview without form + 2 references on file." },
  ];

  return (
    <div>
      <SectionTitle icon="🔍" title="Recruitment" subtitle="From job posting to interview — DSWD/DOLE child-safe hiring" color={T.teal} />
      <ComplianceTags tags={[{ label:"DSWD AO 16 s.2004" }, { label:"RA 7610" }, { label:"DOLE Fair Employment" }, { label:"MOO Section IX" }]} />

      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "7px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontWeight: tab === t.id ? 700 : 500, fontSize: 12, background: tab === t.id ? T.teal : T.grayL, color: tab === t.id ? T.white : T.dark, transition: "all 0.15s" }}>{t.label}</button>
        ))}
      </div>

      {tab === "tracker" && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>Active Applicants</div>
          <Alert type="info">Send applicants the pre-screen link and aptitude assessment via Messenger. Both are standalone HTML files deployed to Netlify. Track progress here.</Alert>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.navy }}>
                {["Name","Role","Applied","Status","Assess%","AI/10","Flag","Action"].map(h => (
                  <th key={h} style={{ padding: "9px 12px", color: T.white, textAlign: "left", fontWeight: 700, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {applicantList.map((a, i) => (
                <tr key={i} style={{ background: i % 2 === 0 ? T.cream : T.white, borderBottom: `1px solid ${T.grayL}` }}>
                  <td style={{ padding: "9px 12px" }}>
                    <div style={{ fontWeight:600,color:T.navy,fontSize:12 }}>{a.name}</div>
                    {a.note && <div style={{ fontSize:10,color:a.flag?T.red:"#6B7280",marginTop:2,lineHeight:1.4,maxWidth:220 }}>{a.note}</div>}
                  </td>
                  <td style={{ padding: "9px 12px",color:T.dark,fontSize:11 }}>{a.role}</td>
                  <td style={{ padding: "9px 12px",color:T.gray,fontSize:11 }}>{a.date}</td>
                  <td style={{ padding: "9px 12px",fontSize:11 }}><Badge label={a.status} color={a.flag ? T.red : T.teal} /></td>
                  <td style={{ padding: "9px 12px",fontWeight:700,color:a.score>=70?T.green:a.score>=55?T.amber:T.gray }}>{a.score?`${a.score}%`:"—"}</td>
                  <td style={{ padding: "9px 12px",fontWeight:700,color:a.aiScore>=7?T.green:a.aiScore>=5?T.amber:T.gray }}>{a.aiScore?`${a.aiScore}/10`:"—"}</td>
                  <td style={{ padding: "9px 12px" }}>{a.flag ? "🚨 FLAG" : "✓"}</td>
                  <td style={{ padding: "9px 12px" }}><Btn size="sm" onClick={() => setSelectedApplicant(a)} color={T.teal}>Review</Btn></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
            <Btn color={T.navy} onClick={() => setShowAddModal(true)}>+ Add Applicant</Btn>
            <Btn outline color={T.teal} onClick={exportList}>📤 Export List</Btn>
          </div>
          {/* ADD APPLICANT MODAL */}
          {showAddModal && (
            <div style={{ position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center" }}>
              <div style={{ background:T.white,borderRadius:16,padding:28,width:520,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
                <div style={{ fontSize:16,fontWeight:800,color:T.navy,marginBottom:20 }}>+ Add New Applicant</div>
                {[
                  {label:"Full Name *",key:"name",type:"text",placeholder:"e.g. Maria Santos"},
                  {label:"Role Applied",key:"role",type:"select",options:["House Parent I","House Parent II","Social Worker","Cook","Teacher","Admin","Driver","Other"]},
                  {label:"Date Applied",key:"date",type:"text",placeholder:"e.g. Jul 5"},
                  {label:"Current Status",key:"status",type:"select",options:["Application received","AI Screen pending","Assessment sent","Assessment complete","Interview 1 scheduled","Interview 1 done","References pending","Interview 2 scheduled","Offer pending","Hired","Declined","Withdrawn"]},
                  {label:"Assessment Score %",key:"score",type:"text",placeholder:"e.g. 82"},
                  {label:"AI Screen Score /10",key:"aiScore",type:"text",placeholder:"e.g. 8"},
                  {label:"Notes / Flags",key:"note",type:"text",placeholder:"Key observations, flags, next steps"},
                ].map(field => (
                  <div key={field.key} style={{ marginBottom:12 }}>
                    <div style={{ fontSize:11,fontWeight:700,color:T.dark,marginBottom:4 }}>{field.label}</div>
                    {field.type==="select" ? (
                      <select value={newApplicant[field.key]} onChange={e=>setNewApplicant(p=>({...p,[field.key]:e.target.value}))}
                        style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${T.grayL}`,fontSize:13,fontFamily:"inherit" }}>
                        {field.options.map(o=><option key={o}>{o}</option>)}
                      </select>
                    ) : (
                      <input type="text" value={newApplicant[field.key]} placeholder={field.placeholder}
                        onChange={e=>setNewApplicant(p=>({...p,[field.key]:e.target.value}))}
                        style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${T.grayL}`,fontSize:13,fontFamily:"inherit",boxSizing:"border-box" }} />
                    )}
                  </div>
                ))}
                <div style={{ display:"flex",gap:10,marginTop:20 }}>
                  <button onClick={addApplicant} style={{ background:T.navy,color:T.white,border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,cursor:"pointer",fontSize:13 }}>Save Applicant</button>
                  <button onClick={()=>setShowAddModal(false)} style={{ background:T.grayL,color:T.dark,border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:13 }}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* REVIEW APPLICANT MODAL */}
          {selectedApplicant && (
            <div style={{ position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center" }}>
              <div style={{ background:T.white,borderRadius:16,padding:28,width:580,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",maxHeight:"80vh",overflowY:"auto" }}>
                <div style={{ fontSize:16,fontWeight:800,color:T.navy,marginBottom:4 }}>{selectedApplicant.name}</div>
                <div style={{ fontSize:13,color:T.gray,marginBottom:20 }}>{selectedApplicant.role} · Applied {selectedApplicant.date}</div>
                {[
                  {label:"Current Status",value:selectedApplicant.status},
                  {label:"Assessment Score",value:selectedApplicant.score?`${selectedApplicant.score}%`:"Not yet completed"},
                  {label:"AI Screen Score",value:selectedApplicant.aiScore?`${selectedApplicant.aiScore}/10`:"Not yet scored"},
                  {label:"Safeguarding Flag",value:selectedApplicant.flag?"⚠️ YES — review required":"✓ No flags"},
                  {label:"Notes",value:selectedApplicant.note||"No notes"},
                ].map(item=>(
                  <div key={item.label} style={{ padding:"10px 0",borderBottom:`1px solid ${T.grayL}` }}>
                    <div style={{ fontSize:11,fontWeight:700,color:T.gray,marginBottom:4 }}>{item.label}</div>
                    <div style={{ fontSize:14,color:item.label==="Safeguarding Flag"&&selectedApplicant.flag?T.red:T.dark,fontWeight:item.label==="Safeguarding Flag"?700:400 }}>{item.value}</div>
                  </div>
                ))}
                <div style={{ marginTop:20 }}>
                  <div style={{ fontSize:12,fontWeight:700,color:T.navy,marginBottom:8 }}>NEXT STEP OPTIONS</div>
                  <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
                    {["Send Assessment Link","Schedule Interview 1","Request References","Schedule Interview 2","Recommend to Amy","Decline Application"].map(action=>(
                      <button key={action} onClick={()=>{
                        const statusMap = {
                          "Send Assessment Link":"Assessment sent",
                          "Schedule Interview 1":"Interview 1 scheduled",
                          "Request References":"References pending",
                          "Schedule Interview 2":"Interview 2 scheduled",
                          "Recommend to Amy":"Pending ED review",
                          "Decline Application":"Declined"
                        };
                        setApplicantList(prev=>prev.map(a=>a.name===selectedApplicant.name?{...a,status:statusMap[action]||a.status}:a));
                        setSelectedApplicant(null);
                      }} style={{ padding:"9px 12px",borderRadius:8,border:`1.5px solid ${action==="Decline Application"?T.red:T.teal}`,background:T.white,color:action==="Decline Application"?T.red:T.teal,cursor:"pointer",fontSize:12,fontWeight:600 }}>{action}</button>
                    ))}
                  </div>
                </div>
                <button onClick={()=>setSelectedApplicant(null)} style={{ marginTop:16,background:T.grayL,color:T.dark,border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:13,width:"100%" }}>Close</button>
              </div>
            </div>
          )}

          <div style={{ marginTop: 14, background: T.navy + "06", borderRadius: 8, padding: 12, fontSize: 11, color: T.gray, lineHeight: 1.7 }}>
            <strong>Phase 2:</strong> Applicants submitted directly from the pre-screen form. Tracker auto-updates. Sprouts notified when hire is confirmed.
          </div>
        </Card>
      )}

      {tab === "requisition" && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>Job Requisition — ED Approval Required</div>
          <Alert type="warning">Salary must fall within the approved compensation band per MOO. This requisition must be approved by the Executive Director before any job posting goes live.</Alert>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[
              { label: "Position Title", placeholder: "e.g. House Parent Level 1" },
              { label: "Department / Program", placeholder: "e.g. Child Development" },
              { label: "Supervisor", placeholder: "Immediate supervisor position" },
              { label: "Monthly Rate (PHP)", placeholder: "e.g. 13,260" },
              { label: "Target Start Date", placeholder: "Estimated start date", type: "date" },
              { label: "Funding Source", placeholder: "Operating fund / grant" },
            ].map(f => (
              <Field key={f.label} label={f.label}>
                <Input type={f.type || "text"} placeholder={f.placeholder} value="" onChange={() => {}} />
              </Field>
            ))}
          </div>
          <Field label="Child Contact Role?">
            <Select value="yes" onChange={() => {}}>
              <option value="yes">Yes — requires enhanced screening (NBI, CPP, references)</option>
              <option value="no">No — standard screening applies</option>
            </Select>
          </Field>
          <Field label="Justification for Hire">
            <Textarea placeholder="Why is this position needed now? What gap does it fill?" value="" onChange={() => {}} rows={3} />
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <Btn color={T.teal} onClick={() => {}}>Submit for ED Approval</Btn>
            <Btn outline color={T.gray} onClick={() => {}}>Save Draft</Btn>
          </div>
        </Card>
      )}

      {tab === "aiscreen" && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 4 }}>AI Round 1 Screener</div>
          <div style={{ fontSize: 12, color: T.gray, marginBottom: 14 }}>Paste the applicant's written responses from the pre-screen form. AI reviews for child-safe suitability, quotes specific language, and flags concerns.</div>
          <Alert type="danger">AI output is advisory only. Jackson must review before any decision. No applicant is advanced or rejected based on AI alone.</Alert>
          <Field label="Role Being Screened">
            <Select value={selectedRole} onChange={e => setSelectedRole(e.target.value)}>
              {Object.entries(ROLE_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </Select>
          </Field>
          <Field label="Applicant's Written Responses">
            <Textarea value={applicantText} onChange={e => setApplicantText(e.target.value)} placeholder="Paste the applicant's answers from the pre-screen form here — cover letter, motivation, boundary question, disclosure response, etc." rows={7} />
          </Field>
          <Btn color={T.teal} onClick={runScreen} disabled={aiLoading || !applicantText.trim()}>
            {aiLoading ? "⏳ Screening..." : "🤖 Run AI Child-Safe Screen"}
          </Btn>
          {aiResult && (
            <div style={{ marginTop: 16, background: T.navy + "05", border: `1px solid ${T.navy}20`, borderRadius: 10, padding: 16 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.navy }}>AI SCREENING RESULT</div>
                <Badge label="Advisory — Jackson Must Review" color={T.amber} />
              </div>
              <pre style={{ margin: 0, fontSize: 13, color: T.dark, whiteSpace: "pre-wrap", fontFamily: "inherit", lineHeight: 1.8 }}>{aiResult}</pre>
            </div>
          )}
        </Card>
      )}

      {tab === "checklist" && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 4 }}>Pre-Employment Requirements Checklist</div>
          <Alert type="danger">Child-contact staff cannot begin work until NBI Clearance is physically verified and Child Protection Policy is signed. These are DSWD AO 16 s.2004 hard requirements.</Alert>
          {[
            { section: "🔴 Hard Requirements (No Contract Without These)", items: [
              { label: "NBI Clearance — original + copy, current", dswd: true },
              { label: "Barangay Clearance — current", dswd: true },
              { label: "Medical Certificate / Fit-to-Work", dswd: true },
              { label: "Reference Check 1 — documented call with notes", dswd: true },
              { label: "Reference Check 2 — documented call with notes", dswd: true },
            ]},
            { section: "🟡 Must Submit Before Day 1", items: [
              { label: "Diploma / Transcript / PRC License (as applicable)" },
              { label: "SSS ID / Number" },
              { label: "PhilHealth ID / Number" },
              { label: "Pag-IBIG (HDMF) ID / Number" },
              { label: "BIR TIN / TIN Card" },
              { label: "Bank account details for Sprouts PH payroll" },
              { label: "Valid government-issued ID (copy)" },
            ]},
            { section: "🟢 Signed on Day 1 (Onboarding)", items: [
              { label: "Child Protection Policy Acknowledgment" },
              { label: "Data Privacy Consent (RA 10173)" },
              { label: "Employee Handbook Acknowledgment" },
              { label: "Code of Conduct Agreement" },
              { label: "Safe Spaces Act (RA 11313) Acknowledgment" },
              { label: "Confidentiality Agreement" },
              { label: "Drug-Free Workplace Acknowledgment" },
            ]},
          ].map(section => (
            <div key={section.section} style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.navy, marginBottom: 10, paddingBottom: 6, borderBottom: `2px solid ${T.grayL}` }}>{section.section}</div>
              {section.items.map((item, i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 12px", marginBottom: 6, background: T.cream, borderRadius: 8, border: `1px solid ${T.grayL}` }}>
                  <input type="checkbox" style={{ width: 16, height: 16, accentColor: T.teal }} />
                  <span style={{ fontSize: 13, color: T.dark, flex: 1 }}>{item.label}</span>
                  {item.dswd && <Badge label="DSWD AO 16" color={T.red} />}
                </div>
              ))}
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// MODULE: ONBOARDING
// ═══════════════════════════════════════════════════════════════════
function Onboarding() {
  const [step, setStep] = useState(0);
  const [role, setRole] = useState("houseparent");
  const [day1, setDay1] = useState({});

  const D1_ITEMS = [
    { id:"handbook", label:"Employee Handbook", critical: false },
    { id:"moo", label:"Manual of Operations (key sections)", critical: false },
    { id:"cpp", label:"Child Protection Policy + quiz", critical: true },
    { id:"safe", label:"Safe Spaces Act (RA 11313)", critical: false },
    { id:"privacy", label:"Data Privacy Consent (RA 10173)", critical: true },
    { id:"coc", label:"Code of Conduct Agreement", critical: false },
    { id:"conf", label:"Confidentiality Agreement", critical: true },
    { id:"drug", label:"Drug-Free Workplace", critical: false },
    { id:"outside", label:"Outside Employment Declaration", critical: false },
    { id:"internet", label:"Internet & Electronics Policy", critical: false },
  ];

  const cppUnsigned = !day1["cpp"];
  const done = Object.values(day1).filter(Boolean).length;

  return (
    <div>
      <SectionTitle icon="📋" title="Onboarding" subtitle="New hire checklist — from contract signing to first week complete" color={T.gold} />
      <ComplianceTags tags={[{ label:"DOLE Art. 296" }, { label:"DSWD AO 16" }, { label:"MOO Onboarding" }, { label:"RA 10173" }]} />

      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {["Contract Setup","Day 1 Orientation","Week 1 Training","Sprouts PH Setup","Probation Schedule"].map((s, i) => (
          <button key={i} onClick={() => setStep(i)} style={{ padding: "7px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontWeight: step === i ? 700 : 500, fontSize: 12, background: step === i ? T.gold : T.grayL, color: step === i ? T.white : T.dark }}>{s}</button>
        ))}
      </div>

      {step === 0 && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>6-Month Probationary Contract Setup</div>
          <Alert type="danger">DOLE Article 296: Standards for regularization must be communicated in writing at time of engagement. The contract cannot be generated without these standards populated. ED must sign before delivery.</Alert>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[
              { label:"Employee Full Legal Name", placeholder:"As on government ID" },
              { label:"Position", placeholder:"Exact title per MOO" },
              { label:"Start Date", type:"date", placeholder:"" },
              { label:"Monthly Basic Salary (PHP)", placeholder:"Must match approved band" },
              { label:"Supervisor", placeholder:"Immediate supervisor position" },
              { label:"Work Schedule", placeholder:"e.g. 6-day week, rotating shift" },
            ].map(f => <Field key={f.label} label={f.label}><Input type={f.type||"text"} placeholder={f.placeholder} value="" onChange={()=>{}} /></Field>)}
          </div>
          <Field label="Standards for Regularization (Required by DOLE Art. 296)" required>
            <Textarea placeholder="State specific, measurable performance standards that must be met for regularization. These must be explicit — vague standards create legal risk." value="" onChange={() => {}} rows={4} />
          </Field>
          <div style={{ background: T.cream, borderRadius: 8, padding: 12, fontSize: 12, color: T.dark, marginBottom: 14, lineHeight: 1.7 }}>
            <strong>Auto-calculated dates:</strong> Day 30 evaluation, Day 60 evaluation, Day 90 evaluation, Day 150 (Month 5 decision alert), Day 180 (legal deadline)
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn color={T.gold} onClick={() => {}}>Generate Contract for ED Review</Btn>
            <Btn outline color={T.gray} onClick={() => {}}>Save Draft</Btn>
          </div>
        </Card>
      )}

      {step === 1 && (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.navy }}>Day 1 Policy Acknowledgments</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: done === D1_ITEMS.length ? T.green : T.amber }}>{done}/{D1_ITEMS.length} Complete</div>
          </div>
          {cppUnsigned && <Alert type="danger"><strong>Child Protection Policy not yet signed.</strong> Employee cannot be assigned to child-contact duties until this is completed.</Alert>}
          <div style={{ height: 8, background: T.grayL, borderRadius: 4, marginBottom: 16, overflow: "hidden" }}>
            <div style={{ height: "100%", background: done === D1_ITEMS.length ? T.green : T.teal, borderRadius: 4, width: `${(done / D1_ITEMS.length) * 100}%`, transition: "width 0.3s" }} />
          </div>
          {D1_ITEMS.map(item => (
            <div key={item.id} onClick={() => setDay1(prev => ({ ...prev, [item.id]: !prev[item.id] }))}
              style={{ display: "flex", gap: 10, alignItems: "center", padding: "10px 12px", marginBottom: 6, background: day1[item.id] ? T.greenL : item.critical ? T.redL : T.cream, borderRadius: 8, border: `1px solid ${day1[item.id] ? T.green : item.critical && !day1[item.id] ? T.red : T.grayL}`, cursor: "pointer" }}>
              <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${day1[item.id] ? T.green : item.critical ? T.red : T.grayL}`, background: day1[item.id] ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: T.white, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{day1[item.id] ? "✓" : ""}</div>
              <span style={{ fontSize: 13, fontWeight: item.critical ? 700 : 400, color: T.dark, flex: 1 }}>{item.label}</span>
              {item.critical && <Badge label="Critical" color={T.red} />}
            </div>
          ))}
        </Card>
      )}

      {step === 2 && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>Week 1 Training Assignments</div>
          <Alert type="danger">Child Protection Training must be completed before any child-contact duties. This is a DSWD hard requirement. Daily escalation to supervisor and ED if not done by Day 3.</Alert>
          {[
            { training: "Child Protection Training", deadline: "Day 3", critical: true, basis: "DSWD AO 16; MOO" },
            { training: "Positive Discipline", deadline: "Day 5", basis: "MOO; DSWD residential standards" },
            { training: "Incident Reporting Procedures", deadline: "Day 5", basis: "MOO safeguarding" },
            { training: "CODI / Safe Spaces Orientation (RA 11313)", deadline: "Day 5", basis: "RA 11313; MOO" },
            { training: "Data Privacy (practical, RA 10173)", deadline: "Day 5", basis: "RA 10173; NPC; MOO" },
            { training: "Role-Specific Training", deadline: "Day 5", basis: "MOO; DSWD HR competency" },
            { training: "DRRM / OSH Safety (RA 11058)", deadline: "Day 30", basis: "RA 11058; DOLE" },
          ].map((t, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", marginBottom: 6, background: T.cream, borderRadius: 8, border: `1px solid ${t.critical ? T.red + "44" : T.grayL}` }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <input type="checkbox" style={{ width: 16, height: 16, accentColor: T.teal }} />
                <div>
                  <div style={{ fontSize: 13, fontWeight: t.critical ? 700 : 400, color: T.dark }}>{t.training}</div>
                  <div style={{ fontSize: 11, color: T.gray }}>{t.basis}</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                <Badge label={`Due: ${t.deadline}`} color={t.critical ? T.red : T.teal} />
                {t.critical && <Badge label="HARD BLOCK" color={T.red} />}
              </div>
            </div>
          ))}
        </Card>
      )}

      {step === 3 && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>Sprouts PH Setup Checklist</div>
          <Alert type="info">Complete Sprouts setup before or on Day 1. Data in Sprouts must match the signed employment contract exactly. Run a mismatch check every week.</Alert>
          {["Legal name (match government ID exactly)", "Position and department", "Immediate supervisor assigned", "Start date and employment status (Probationary)", "Work schedule / shift assigned", "Leave profile configured (SIL per years-of-service table)", "Payroll bank details entered", "SSS / PhilHealth / Pag-IBIG / BIR numbers encoded", "Digital 201 folder created in Google Drive", "Emergency contact recorded", "Timekeeping access granted", "Employee informed of Sprouts login and how to use it"].map((item, i) => (
            <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 12px", marginBottom: 6, background: T.cream, borderRadius: 8, border: `1px solid ${T.grayL}` }}>
              <input type="checkbox" style={{ width: 16, height: 16, accentColor: T.teal }} />
              <span style={{ fontSize: 13, color: T.dark }}>{item}</span>
            </div>
          ))}
        </Card>
      )}

      {step === 4 && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.navy, marginBottom: 14 }}>Probationary Review Schedule</div>
          <Alert type="danger">DOLE Article 296: The Month 5 decision must be delivered before Day 180. Failure = automatic regularization by operation of law.</Alert>
          {[
            { milestone: "Day 30 Evaluation", dole: "MOO + DOLE", desc: "Early adjustment, attendance, attitude, initial competency. Form sent to supervisor on Day 16.", trigger: "Day 16 → supervisor", deadline: "Day 30", color: T.teal },
            { milestone: "Day 60 Evaluation", dole: "MOO + DOLE", desc: "Role competency, training progress, child-safety conduct, documentation quality.", trigger: "Day 46 → supervisor", deadline: "Day 60", color: T.teal },
            { milestone: "Day 90 Evaluation", dole: "MOO + DOLE", desc: "Performance vs. standards, mid-point gap check, non-regularization risk flag if concerns exist.", trigger: "Day 76 → supervisor", deadline: "Day 90", color: T.navy },
            { milestone: "Month 5 Decision", dole: "DOLE Art. 296 CRITICAL", desc: "Final regularization or non-regularization decision. Legal review required for non-regularization. ED signs.", trigger: "Day 135 → Jackson + ED", deadline: "Before Day 180 — ABSOLUTE", color: T.red },
          ].map((m, i) => (
            <div key={i} style={{ background: T.white, borderRadius: 10, border: `1px solid ${m.color}44`, padding: 14, marginBottom: 10, borderLeft: `4px solid ${m.color}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: T.navy }}>{m.milestone}</div>
                <Badge label={m.dole} color={m.color} />
              </div>
              <div style={{ fontSize: 12, color: T.gray, marginBottom: 6, lineHeight: 1.6 }}>{m.desc}</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                <Badge label={`Auto-trigger: ${m.trigger}`} color={T.teal} />
                <Badge label={`Deadline: ${m.deadline}`} color={m.color} />
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>

// MODULE: HR ASSISTANT
// ═══════════════════════════════════════════════════════════════════
function HRAssistant() {
  const [messages, setMessages] = useState([
    { role:"assistant", text:"Hi! I'm Safe Haven's HR Assistant. I know your Employee Handbook, MOO, DOLE rules, DSWD requirements, and SIL policies. Ask me anything — in English or Filipino.\n\nCommon questions:\n• How many SIL days does [employee] have?\n• What's the process for a Day 30 evaluation?\n• When must the Month 5 notice be delivered?\n• What are the NTE requirements for WC-02?\n• What trainings are required before child-contact work?" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role:"user", text:userMsg }]);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": SAFE_HAVEN_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:900,

KEY POLICIES:

- Child protection policy: zero tolerance. All staff are mandatory reporters (RA 7610).
- Core values: Love, Joy, Excellence, Faithfulness, Respect.

For sensitive matters (termination, final pay, discipline), always recommend human HR and legal review.
Be warm, practical, and concise. You can answer in English or Filipino.

HOUSE PARENT TRAINING MODULES — ALL 18 MODULES:
You know the content of all 18 Safe Haven training modules. Jackson and supervisors can ask about any module.

MODULE 1 — HP Role: Identity, Purpose, Responsibility. Professional caregiving role. Mandatory reporter. Reports to Child Development Supervisor. Core values: Love, Joy, Excellence, Faithfulness, Respect.

MODULE 2 — Understanding Children in Care. Trauma, abandonment, neglect, abuse backgrounds. Behavior = communication of unmet needs. Case plan managed by social worker.

MODULE 3 — Trauma-Informed Care (REQUIRED FOR HP LEVEL 2 PROMOTION — MOO APP.15-A). Principles: Safety, Trustworthiness, Choice, Collaboration, Empowerment. Consistent routines, calm regulation, de-escalation techniques.

MODULE 4 — Positive Discipline (REQUIRED FOR HP LEVEL 2 PROMOTION — MOO APP.15-A). Corporal punishment PROHIBITED — CP-05 offense (immediate termination). Positive approaches: calm expectations, natural consequences, co-regulation, redirection.

MODULE 5 — Child Protection and Mandatory Reporting. RA 7610. If disclosure: listen calmly, no confidentiality promise, no self-investigation, document exact words, report to CPO same shift. No progressive discipline for safeguarding offenses.

MODULE 6 — Professional Boundaries. No private closed-space contact, no personal gifts, no personal contact info exchange, appropriate physical contact only in view of others. Over-attachment is a safeguarding risk.

MODULE 7 — Supervision, Routines, Safety Checks. Ratios: 0-3yr=1:5, 4-12yr=1:8, 13-17yr=1:10. Head counts every shift change. Never leave children unsupervised. Stay until qualified replacement arrives.

MODULE 8 — Incident Documentation (REQUIRED FOR HP LEVEL 2 PROMOTION — MOO APP.15-A). Factual, specific, timely, objective. Document same day. Quote children's words exactly. Incident Report required for injury, disclosure, behavioral crisis, medical emergency.

MODULE 9 — Emergency Response. Emergency chain: ensure safety → assess → call supervisor+911 → basic care → stay → document. Specific responses for seizure, choking, bleeding, burns, allergic reaction, head injury, fire.

MODULE 10 — Wellness and Burnout Prevention. Secondary traumatic stress is real. Signs: exhaustion, cynicism, reduced effectiveness. Asking for help mid-shift is policy. Burnout is a child safety risk.

MODULE 11 — Child Rights. UNCRC, RA 7610, RA 9344, DSWD AO 16. Rights to safety, privacy, participation, dignity, education, religion, family. Treat children as whole persons.

MODULE 12 — Permanency Planning. Goal is reintegration, foster care, adoption, or independent living. Support case plan, support family visits, develop life skills. Never promise outcomes about placement.

MODULE 13 — Self-Awareness and Problem Solving. Know your triggers, limits, and biases. Reflective practice. Professional identity: caregiver, not substitute parent.

MODULE 14 — Data Privacy (RA 10173 — REQUIRED ALL STAFF). Never share child info on social media, with friends, or via personal photos. Secure all records. Report accidental disclosure same day. Criminal charges possible for violations.

MODULE 15 — Safe Spaces Act (RA 11313 — REQUIRED ALL STAFF). Prohibits gender-based sexual harassment. Any act toward children also triggers child protection response. CODI handles complaints. Non-retaliation mandatory.

MODULE 16 — First Aid and CPR Awareness (MOO APP.15 — CERTIFICATION REQUIRED SEPARATELY, HAS EXPIRY DATE). Awareness-level only. Emergency chain. Key responses per emergency type. All medical incidents require same-day Incident Report.

MODULE 17 — Drug-Free Workplace (RA 9165 — REQUIRED ALL STAFF). Impairment on shift = child safety risk. Prescription drugs causing drowsiness: inform supervisor before shift. Colleague impairment concern: report to HR immediately — do not confront directly.

MODULE 18 — Receiving and Routing Child Grievances (MOO — REQUIRED ALL STAFF). MOO Grievance Flow: Child → House Parent → Social Worker (same day) → Child Protection Committee → ED → DSWD if required. Non-retaliation is protected. When in doubt whether grievance or disclosure — treat as disclosure and escalate.

HP LEVEL 1 → LEVEL 2 PROMOTION TRAINING REQUIREMENTS (MOO APPENDIX 15-A PATHWAY B):
Three specifically required trainings: Module 3 (Trauma-Informed Care), Module 4 (Positive Discipline), Module 8 (Documentation Standards).
Also required: 1+ year service, satisfactory evaluations, no open disciplinary cases, supervisor endorsement, ED approval.
HP Level 2 Provisional salary: PHP 14,000/month — verify against current Davao City RTWPB-XI wage order before issuing promotion notice.`,

function SafeHavenHRSystem() {

      case "employees":   return <EmployeeRecords />;
      case "performance": return <Performance />;
      case "training":    return <Training />;
      case "discipline":  return <Discipline />;
      case "exit":        return <Exit />;

    ...group, groupId,

    <div style={{ display:"flex",minHeight:"100vh",background:T.cream,fontFamily:"'Segoe UI',system-ui,sans-serif" }}>
