<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Safe Haven — Aptitude Assessment</title>
<style>
  :root {
    --navy: #1B2B4B; --teal: #2A7A7A; --teal2: #3AADAD;
    --gold: #C8941A; --cream: #F7F4EE; --white: #FFFFFF;
    --red: #B83232; --redL: #FDEAEA; --green: #1A6B3C; --greenL: #EAFAF1;
    --amber: #C47A15; --amberL: #FEF6E4;
    --gray: #6B7280; --grayL: #E5E7EB; --dark: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* ── HEADER ── */
  .hdr { background: var(--navy); padding: 16px 20px; }
  .hdr-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .hdr-logo { width: 44px; height: 44px; background: var(--teal); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .hdr-title { color: var(--white); font-weight: 800; font-size: 16px; }
  .hdr-sub { color: var(--teal2); font-size: 11px; margin-top: 2px; letter-spacing: 0.4px; }
  .hdr-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── TIMER ── */
  .timer-pill {
    background: rgba(255,255,255,0.12); color: var(--white);
    border-radius: 20px; padding: 6px 14px;
    font-size: 14px; font-weight: 800; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums;
  }
  .timer-pill.warn { background: var(--amber) + "44"; color: #FCD34D; }
  .timer-pill.urgent { background: rgba(184,50,50,0.3); color: #FCA5A5; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── PROGRESS ── */
  .prog-wrap { background: rgba(255,255,255,0.1); border-radius: 4px; height: 5px; flex: 1; overflow: hidden; }
  .prog-bar { height: 100%; background: var(--teal2); border-radius: 4px; transition: width 0.3s; }

  /* ── ROLE SELECT ── */
  .role-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .role-card { background: var(--white); border-radius: 20px; padding: 36px 32px; max-width: 520px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.12); text-align: center; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 24px 0; }
  .role-btn { border: 2px solid var(--grayL); background: var(--white); border-radius: 14px; padding: 18px 14px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .role-btn:hover { border-color: var(--teal); box-shadow: 0 4px 16px rgba(42,122,122,0.15); transform: translateY(-1px); }
  .role-btn .ri { font-size: 28px; margin-bottom: 8px; display: block; }
  .role-btn .rl { font-size: 13px; font-weight: 700; color: var(--navy); }
  .role-btn .rs { font-size: 11px; color: var(--gray); margin-top: 3px; line-height: 1.4; }

  /* ── INTRO SCREEN ── */
  .intro-screen { max-width: 580px; margin: 0 auto; padding: 24px; }
  .intro-card { background: var(--white); border-radius: 16px; padding: 28px; border: 1px solid var(--grayL); }
  .intro-icon { font-size: 40px; margin-bottom: 14px; }
  .intro-title { font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
  .intro-sub { font-size: 13px; color: var(--gray); line-height: 1.7; margin-bottom: 20px; }
  .section-list { margin: 0; padding: 0; list-style: none; }
  .section-list li { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px dashed var(--grayL); font-size: 13px; color: var(--dark); }
  .section-list li:last-child { border-bottom: none; }
  .s-num { width: 22px; height: 22px; border-radius: 50%; background: var(--teal); color: var(--white); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .warn-box { background: var(--amberL); border-left: 4px solid var(--amber); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 12px; color: var(--dark); margin: 16px 0; line-height: 1.6; }
  .start-btn { width: 100%; padding: 15px; background: var(--teal); color: var(--white); border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 18px; transition: background 0.15s; }
  .start-btn:hover { background: var(--navy); }

  /* ── QUESTION SCREEN ── */
  .q-screen { max-width: 680px; margin: 0 auto; padding: 20px; }
  .section-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--navy); color: var(--white); border-radius: 20px; padding: 4px 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 14px; }
  .q-card { background: var(--white); border-radius: 16px; border: 1px solid var(--grayL); overflow: hidden; margin-bottom: 20px; }
  .q-head { padding: 18px 20px; background: #F9FAFB; border-bottom: 1px solid var(--grayL); }
  .q-num { font-size: 10px; font-weight: 700; color: var(--teal); letter-spacing: 0.5px; margin-bottom: 6px; }
  .q-text { font-size: 15px; font-weight: 700; color: var(--navy); line-height: 1.6; }
  .q-context { font-size: 12px; color: var(--gray); margin-top: 6px; line-height: 1.6; font-style: italic; }
  .q-body { padding: 18px 20px; }
  .choice-list { display: flex; flex-direction: column; gap: 8px; }
  .choice { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--grayL); cursor: pointer; transition: all 0.12s; }
  .choice:has(input:checked) { border-color: var(--teal); background: #EEF8F8; }
  .choice input { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; accent-color: var(--teal); cursor: pointer; }
  .choice span { font-size: 13px; line-height: 1.6; color: var(--dark); }
  .write-area { width: 100%; min-height: 120px; padding: 12px 14px; border: 1.5px solid var(--grayL); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--dark); outline: none; resize: vertical; transition: border-color 0.15s; line-height: 1.7; }
  .write-area:focus { border-color: var(--teal); }
  .word-count { font-size: 11px; color: var(--gray); margin-top: 6px; text-align: right; }
  .write-prompt { font-size: 12px; color: var(--teal); margin-bottom: 8px; font-weight: 600; }

  /* ── SCENARIO BOX ── */
  .scenario { background: var(--navy) + "08"; border: 1px solid var(--navy) + "22"; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-size: 13px; line-height: 1.8; color: var(--dark); }
  .scenario strong { color: var(--navy); }

  /* ── NAV ── */
  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .nav-btn { padding: 11px 22px; border-radius: 10px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .nav-prev { background: var(--grayL); color: var(--dark); }
  .nav-next { background: var(--teal); color: var(--white); }
  .nav-next:disabled { background: var(--gray); cursor: not-allowed; }
  .q-dots { display: flex; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grayL); transition: background 0.2s; }
  .dot.done { background: var(--teal); }
  .dot.current { background: var(--navy); transform: scale(1.3); }

  /* ── RESULTS ── */
  .results-screen { max-width: 700px; margin: 0 auto; padding: 24px; }
  .result-header { background: linear-gradient(135deg, var(--navy), var(--teal)); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 20px; color: var(--white); }
  .result-score { font-size: 52px; font-weight: 800; margin: 10px 0 4px; }
  .result-label { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .result-sub { font-size: 13px; opacity: 0.8; }
  .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .result-stat { background: var(--white); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid var(--grayL); }
  .stat-num { font-size: 24px; font-weight: 800; color: var(--navy); }
  .stat-lbl { font-size: 11px; color: var(--gray); margin-top: 3px; }
  .review-card { background: var(--white); border-radius: 14px; border: 1px solid var(--grayL); overflow: hidden; margin-bottom: 14px; }
  .review-head { padding: 12px 16px; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
  .review-body { padding: 14px 16px; }
  .correct-ans { background: var(--greenL); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--green); margin-top: 8px; }
  .wrong-ans { background: var(--redL); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red); margin-top: 8px; }
  .written-ans { background: #F3F4F6; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--dark); margin-top: 8px; line-height: 1.7; border-left: 3px solid var(--teal); }
  .flag-box { background: var(--amberL); border-left: 3px solid var(--amber); border-radius: 0 8px 8px 0; padding: 8px 12px; font-size: 11px; color: var(--amber); margin-top: 6px; font-weight: 600; }
  .hr-note { background: var(--navy) + "08"; border: 1px solid var(--navy) + "22"; border-radius: 10px; padding: 14px 16px; font-size: 12px; color: var(--dark); line-height: 1.7; }

  /* ── TIMEOUT ── */
  .timeout-screen { min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 40px; }
  .timeout-icon { font-size: 52px; margin-bottom: 16px; }

  @media(max-width:480px) {
    .role-grid { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════════
// ASSESSMENT DATA
// ════════════════════════════════════════════════════════════════

const ASSESSMENTS = {

  // ── HOUSE PARENT ─────────────────────────────────────────────
  houseparent: {

    intro: {
      title: "House Parent Competency Assessment",
      description: "This short assessment helps Safe Haven understand how you think and communicate in situations you will actually face as a House Parent. There are no trick questions. We are looking for clear thinking, honest judgment, and basic communication skills.",
      sections: [
        { name: "Reading a Scenario", desc: "Read a real child-care situation and answer questions about it", qs: 4, mins: 5 },
        { name: "Incident Report Writing", desc: "Write a short observation note the way a House Parent would", qs: 1, mins: 6 },
        { name: "Situational Judgment", desc: "Choose the best response to real House Parent situations", qs: 5, mins: 5 },
        { name: "Basic Numeracy", desc: "Simple practical math you would use in the role", qs: 2, mins: 2 },
      ],
      instructions: [
        "You have 18 minutes from when you click Start.",
        "The timer runs continuously — it does not pause.",
        "Answer every question. Unanswered questions count as wrong.",
        "For written questions, aim for 3–5 clear sentences.",
        "Answer based on what you would actually do — not what sounds perfect.",
      ]

        question: "What is the FIRST thing you should do?",

          "Tell Joshua firmly that it is past bedtime and he needs to return to his room immediately.",
          "Sit near Joshua at his level, stay calm, and let him know you are there with him without pressuring him to talk.",
          "Call your supervisor immediately and wait for instructions before doing anything.",
          "Ask Joshua directly if someone in the room hurt him, so you can report it right away.",
        ],
        correct: 1,
        explanation: "The first step is a calm, non-threatening presence. A child who won't go back to their room may be scared, traumatized, or disclosing something — but pressuring them or immediately interrogating them can cause harm. Stay with them, regulate the space, then gently explore what is happening. You can call your supervisor after ensuring Joshua is calm and safe.",
        hrFlag: null,
      },
      {
        section: "Section 1: Reading a Scenario",
        type: "reading_mc",
        scenario: "(Continuing the same situation) After 10 minutes of sitting quietly with Joshua, he says: 'Kuya Jay pulled my hair when the lights went off last night and told me not to tell anyone.'",

          "Reassure Joshua you will handle it privately and ask him to go to bed — you will speak to Kuya Jay in the morning.",
          "Document what Joshua said in his exact words and report it immediately to your supervisor or the Child Protection Officer, even if it is late at night.",
          "Speak to Kuya Jay tonight to hear his side of the story before filing anything.",
        ],
        correct: 2,
        explanation: "This is a child protection disclosure. You must: (1) listen without pressing for more details, (2) document the child's exact words, and (3) report immediately to your supervisor or CPO — there is no 'morning' for safeguarding concerns. You must not investigate yourself, confront the alleged person, or promise confidentiality.",
        hrFlag: "Any answer other than C is a serious red flag. A House Parent who would delay, investigate themselves, or promise secrecy poses a risk to children.",
      },
      {
        section: "Section 1: Reading a Scenario",
        type: "reading_mc",
        scenario: "(Still the same night) You have made your report to the supervisor. It is now 11:15pm. Joshua is calmer but still does not want to go back to his room. You need to document what happened for the morning shift.",
        question: "Which of the following is the best way to document what Joshua told you?",
        choices: [
          "\"Joshua had a bad night and said something happened in his room. I reported it. He is now calm.\"",
          "\"At approximately 10:30pm, Joshua was found sitting alone in the hallway, rocking. He would not return to his room. After approximately 10 minutes, he stated: 'Kuya Jay pulled my hair when the lights went off last night and told me not to tell anyone.' I reported this to [supervisor name] at [time]. Joshua remained calm in the hallway for the remainder of the shift.\"",
          "\"Joshua made an allegation against another child. I handled it according to protocol.\"",
          "\"Something happened between Joshua and another child. I filed a verbal report with the supervisor.\"",
        ],
        correct: 1,
        explanation: "Documentation must be specific, factual, and use the child's actual words in quotation marks. Times, names, and exact statements matter — especially in child protection cases that may be reviewed by DSWD, RACCO, or legal authorities. Vague documentation fails the child and creates legal risk.",
        hrFlag: null,
      },
      {
        section: "Section 1: Reading a Scenario",
        type: "reading_mc",
        scenario: "It is the next morning. You are handing over to the day shift House Parent. You are exhausted from the overnight events.",
        question: "What must you include in your shift handover?",
        choices: [
          "Only the most important things — the child protection incident can wait for the supervisor to brief the next shift.",
          "Everything that happened, including Joshua's disclosure, the report you made, who you reported to, Joshua's current status, and any follow-up actions needed.",
          "A general note that it was a difficult night and the next shift should check in with the supervisor.",
          "Nothing about Joshua — to protect his privacy, only the CPO should share that information.",
        ],
        correct: 1,
        explanation: "Shift handovers must be complete and accurate. The incoming House Parent needs to know about Joshua's emotional state and the previous night's events to continue appropriate care. Confidentiality means not sharing outside Safe Haven — not keeping the care team uninformed. Child safety requires continuity of information.",
        hrFlag: null,
      },
      // Section 2: Writing
      {
        section: "Section 2: Incident Report Writing",
        type: "writing",
        question: "A child named Anna (8 years old) refused to eat lunch today. When you tried to encourage her, she said: 'I don't want to eat, I want my Nanay.' She then started crying quietly and went to sit alone in the corner of the room. She stayed there for about 20 minutes before returning to the group. She did not eat lunch.",
        prompt: "Write a short observation note about what happened, the way you would write it in a real Safe Haven daily record. Use factual, specific language. Include the child's words and what you observed. Do not include your opinions about why it happened — only what you saw and heard.",
        minWords: 40,
        guidance: "A good answer will: use specific times or approximate times, use the child's exact words in quotes, describe behavior factually without interpretation, and note what happened afterward. Aim for 3–6 clear sentences.",
        hrFlags: [
          "Answer is vague (e.g. 'Anna was sad today')",
          "Answer includes opinion/diagnosis (e.g. 'Anna is depressed' or 'Anna missed her mom')",
          "Answer is less than 2 sentences",
          "Answer does not mention the child's actual words",

        section: "Section 3: Situational Judgment",
        type: "mc",
        question: "A 12-year-old boy in your care has been rude and disruptive all morning — talking back, refusing to do chores, and using bad language toward other children. You have tried calm redirecting twice. He is now refusing to move from the doorway. What is the best next step?",

          "Physically move him out of the doorway to restore order in the house.",
          "Raise your voice firmly so he understands the seriousness of his behavior.",
          "Give him a natural consequence (e.g. loss of a privilege) and document the behavior, then notify your supervisor.",
          "Ignore the behavior for now and hope he calms down on his own.",
        ],
        correct: 2,
        explanation: "Physical force is never appropriate for behavioral management. Raising your voice escalates rather than de-escalates. Ignoring a doorway block creates a safety issue. The correct response is a clear, calm consequence, documentation, and supervisor notification — especially if the behavior is repeated or escalating.",

      {
        section: "Section 3: Situational Judgment",
        type: "mc",
        question: "A child you care for has started calling you 'Mommy/Daddy' and asks to sleep in your room because she feels safer with you. What do you do?",

        correct: 1,
        explanation: "This is a professional boundaries situation. The child's attachment needs are real and valid — but the correct response is to acknowledge her warmly while maintaining appropriate boundaries, and to flag this to the social worker so her attachment and trauma needs can be properly supported. Allowing room-sharing crosses a serious boundary.",
        hrFlag: "Answer A is a boundary violation. This behavior, however well-intentioned, creates a safeguarding risk.",
      },
      {
        section: "Section 3: Situational Judgment",
        type: "mc",
        question: "You are on shift and you notice that a fellow House Parent has been short-tempered with children all day — raising their voice, being dismissive, and at one point grabbing a child's arm roughly to move them. What do you do?",
        choices: [

        section: "Section 3: Situational Judgment",
        type: "mc",
        question: "A child's biological parent visits and slips the child a mobile phone 'to stay in touch.' The child shows it to you excitedly. What do you do?",

          "Tell the child to hide it so other children do not see and become jealous.",

// STATE
// ════════════════════════════════════════════════════════════════
let state = {
  screen: "role",   // role | intro | question | results | timeout
  role: null,
  currentQ: 0,
  answers: {},      // { qIdx: value }
  timerInterval: null,
  secondsLeft: 0,
  startTime: null,
};

// ════════════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════════════
function startTimer(minutes) {
  state.secondsLeft = minutes * 60;
  state.startTime = Date.now();
  state.timerInterval = setInterval(() => {
    state.secondsLeft--;
    updateTimerDisplay();
    if (state.secondsLeft <= 0) {
      clearInterval(state.timerInterval);
      state.screen = "timeout";
      render();
    }
  }, 1000);
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  el.textContent = '⏱ ' + formatTime(state.secondsLeft);
  el.className = 'timer-pill' +
    (state.secondsLeft < 120 ? ' urgent' : state.secondsLeft < 300 ? ' warn' : '');
}

// ════════════════════════════════════════════════════════════════
// SCORING
// ════════════════════════════════════════════════════════════════
function calculateScore() {
  const assessment = ASSESSMENTS[state.role];
  let correct = 0, total = 0;
  assessment.questions.forEach((q, idx) => {
    if (q.type === 'writing') return;
    total++;
    if (state.answers[idx] === q.correct) correct++;
  });
  const pct = Math.round((correct / total) * 100);
  const writtenAnswers = assessment.questions
    .map((q, idx) => q.type === 'writing' ? { idx, q, answer: state.answers[idx] || "" } : null)
    .filter(Boolean);
  return { correct, total, pct, writtenAnswers };
}

function getScoreLabel(pct) {
  if (pct >= 85) return { label: "Strong", color: "#1A6B3C", desc: "Candidate demonstrates solid job-relevant competency. Proceed to Interview 1." };
  if (pct >= 70) return { label: "Acceptable", color: "#2A7A7A", desc: "Candidate meets the basic threshold. Review written answers carefully. Proceed with Interview 1 noting areas to explore." };
  if (pct >= 55) return { label: "Below Threshold", color: "#C47A15", desc: "Candidate shows gaps in key competency areas. Jackson should review carefully. Consider whether gaps are trainable before proceeding." };
  return { label: "Significant Concern", color: "#B83232", desc: "Multiple competency gaps identified. Jackson must review all incorrect answers — especially safeguarding questions — before any interview decision." };
}

// SUBMIT RESULTS TO GOOGLE SHEETS
// Automatically saves to Safe Haven Assessment Results 2026
// Sheet ID: 1SwktFY4k6xwIoV4837pFzZce9TTlQ_05nx6vEvZjvvw
// Amy and Jackson see results instantly
// ════════════════════════════════════════════════════════════════

// Applicant name collected at start
let applicantName = "";
let applicantEmail = "";

async function emailResults() {
  const assessment = ASSESSMENTS[state.role];
  const { correct, total, pct, writtenAnswers } = calculateScore();
  const { label, desc } = getScoreLabel(pct);
  const timeUsed = assessment.totalMinutes * 60 - state.secondsLeft;
  const minsUsed = Math.floor(timeUsed / 60);
  const secsUsed = timeUsed % 60;
  const timestamp = new Date().toLocaleString('en-PH', {timeZone:'Asia/Manila'});

  // Check for HR flags
  const flaggedQs = assessment.questions
    .map((q, idx) => {
      if (q.type === 'writing') return null;
      if (q.hrFlag && state.answers[idx] !== q.correct) return q.hrFlag;
      return null;
    })
    .filter(Boolean);

  // Build written answers summary
  const writtenSummary = writtenAnswers.map(w =>
    `Q${w.idx+1}: ${w.answer || 'No answer'}`
  ).join(' || ');

  // Build wrong answers summary  
  const wrongSummary = assessment.questions
    .map((q, idx) => {
      if (q.type === 'writing') return null;
      if (state.answers[idx] !== q.correct) {
        return `Q${idx+1} WRONG: chose "${q.choices[state.answers[idx]] || 'none'}" correct was "${q.choices[q.correct]}"`;
      }
      return null;
    })
    .filter(Boolean)
    .join(' | ');

  // All individual answers for full review
  const allAnswers = assessment.questions.map((q, idx) => {
    if (q.type === 'writing') return `[WRITTEN Q${idx+1}]: ${state.answers[idx] || 'No answer'}`;
    const chosen = q.choices[state.answers[idx]] || 'No answer';
    const isCorrect = state.answers[idx] === q.correct;
    return `[Q${idx+1} ${isCorrect ? '✓' : '✗'}]: ${chosen}`;
  }).join(' | ');

  // Submit to Google Sheets via Apps Script Web App
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbxit4sr4YQN2P6xwvc5rHFhTf-1YPGdJsYHxyejAY3zgXNWgk-Nz00fS0aq6fba5EiRoQ/exec';
  
  const data = {
    timestamp: timestamp,
    name: applicantName || 'Not provided',
    email: applicantEmail || 'Not provided',
    role: assessment.role,
    score_pct: pct,
    score_label: label,
    correct: correct,
    total: total,
    time_used: minsUsed + 'm ' + secsUsed + 's',
    hr_flags: flaggedQs.length > 0 ? flaggedQs.join(' | ') : 'None',
    recommendation: desc,
    written_answers: writtenSummary,
    wrong_answers: wrongSummary || 'None',
    all_answers: allAnswers,
    sheet_id: '1SwktFY4k6xwIoV4837pFzZce9TTlQ_05nx6vEvZjvvw'
  };

  try {
    await fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    console.log('Results submitted to Google Sheets');
    return true;
  } catch(e) {
    console.error('Sheet submission failed:', e);
    return false;
  }
}

  const app = document.getElementById('app');

  switch (state.screen) {
    case 'role': app.innerHTML = renderRoleSelect(); break;

  if (state.screen === 'question') updateTimerDisplay();
}

function renderQuestion() {
  const a = ASSESSMENTS[state.role];
  const q = a.questions[state.currentQ];
  const total = a.questions.length;
  const dots = a.questions.map((_, i) => {
    let cls = 'dot';
    if (i < state.currentQ) cls += ' done';
    else if (i === state.currentQ) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  let qContent = '';

  if (q.scenario) {
    qContent += `<div class="scenario"><strong>SCENARIO:</strong><br>${q.scenario}</div>`;
  }

  if (q.type === 'reading_mc' || q.type === 'mc') {
    const choices = q.choices.map((c, i) => `
      <label class="choice">
        <input type="radio" name="q${state.currentQ}" value="${i}" ${state.answers[state.currentQ] === i ? 'checked' : ''}>
        <span>${c}</span>
      </label>`).join('');
    qContent += `<div class="choice-list">${choices}</div>`;
  } else if (q.type === 'writing') {
    const wordCount = (state.answers[state.currentQ] || '').split(/\s+/).filter(Boolean).length;
    const minOk = wordCount >= q.minWords;
    qContent += `
      <div class="write-prompt">📝 ${q.prompt}</div>
      <div class="warn-box" style="margin-bottom:12px"><strong>Guidance:</strong> ${q.guidance}</div>
      <textarea class="write-area" id="writing-answer" placeholder="Write your answer here...">${state.answers[state.currentQ] || ''}</textarea>
      <div class="word-count" id="word-count">${wordCount} words ${minOk ? '✓' : `(minimum ${q.minWords})`}</div>`;
  }

  const pct = Math.round((state.currentQ / total) * 100);
  const answered = state.answers[state.currentQ] !== undefined;
  const isWriting = q.type === 'writing';
  const writingOk = isWriting && (state.answers[state.currentQ] || '').split(/\s+/).filter(Boolean).length >= q.minWords;
  const canNext = isWriting ? writingOk : answered;

  return `
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-logo">${ASSESSMENTS[state.role].icon}</div>
      <div style="flex:1"><div class="hdr-title">${q.section}</div><div class="hdr-sub">${ASSESSMENTS[state.role].role} Assessment · Question ${state.currentQ + 1} of ${total}</div></div>
      <div class="timer-pill" id="timer-display">⏱ ${formatTime(state.secondsLeft)}</div>
    </div>
    <div class="hdr-meta">
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <span style="color:rgba(255,255,255,0.6);font-size:11px;flex-shrink:0">${state.currentQ + 1} / ${total}</span>
    </div>
  </div>
  <div class="q-screen">
    <div class="section-badge">${q.section}</div>
    <div class="q-card">
      <div class="q-head">
        <div class="q-num">QUESTION ${state.currentQ + 1} OF ${total}</div>
        <div class="q-text">${q.question}</div>
        ${q.context ? `<div class="q-context">${q.context}</div>` : ''}
      </div>
      <div class="q-body">${qContent}</div>
    </div>
    <div class="q-nav">
      <button class="nav-btn nav-prev" onclick="prevQ()" ${state.currentQ === 0 ? 'disabled' : ''}>← Back</button>
      <div class="q-dots">${dots}</div>
      <button class="nav-btn nav-next" onclick="nextQ()" ${!canNext ? 'disabled' : ''}>
        ${state.currentQ === total - 1 ? 'Submit Assessment ✓' : 'Next →'}
      </button>
    </div>
  </div>`;
}

function renderResults() {
  const a = ASSESSMENTS[state.role];
  const { correct, total, pct, writtenAnswers } = calculateScore();
  const { label, color, desc } = getScoreLabel(pct);
  const timeUsed = a.totalMinutes * 60 - state.secondsLeft;
  const minsUsed = Math.floor(timeUsed / 60);
  const secsUsed = timeUsed % 60;

  const hasHRFlags = a.questions.some((q, idx) =>
    q.hrFlag && q.type !== 'writing' && state.answers[idx] !== q.correct
  );

  const reviewCards = a.questions.map((q, idx) => {
    if (q.type === 'writing') {
      const ans = state.answers[idx] || '';
      const wc = ans.split(/\s+/).filter(Boolean).length;
      return `
      <div class="review-card">
        <div class="review-head" style="background:#F9FAFB">
          <span style="font-size:13px;font-weight:700;color:var(--navy)">${q.section} — Writing Question</span>
          <span style="font-size:12px;color:var(--teal);font-weight:600">HR REVIEW REQUIRED</span>
        </div>
        <div class="review-body">
          <div style="font-size:13px;font-weight:600;color:var(--dark);margin-bottom:8px">${q.question.substring(0,120)}...</div>
          <div class="written-ans">${ans || '<em style="color:var(--gray)">No answer provided.</em>'}</div>
          <div style="font-size:11px;color:var(--gray);margin-top:6px">Word count: ${wc}</div>
          <div style="margin-top:10px;font-size:11px;font-weight:700;color:var(--amber)">HR REVIEW FLAGS TO CHECK:</div>
          ${q.hrFlags.map(f => `<div style="font-size:11px;color:var(--amber);padding:3px 0;display:flex;gap:6px"><span>⚠️</span>${f}</div>`).join('')}
        </div>
      </div>`;
    }
    const correct_ans = state.answers[idx] === q.correct;
    return `
    <div class="review-card">
      <div class="review-head" style="background:${correct_ans ? '#ECFDF5' : '#FEF2F2'}">
        <span style="font-size:12px;font-weight:700;color:var(--dark)">Q${idx + 1}: ${q.question.substring(0, 80)}${q.question.length > 80 ? '...' : ''}</span>
        <span style="font-size:12px;font-weight:700;color:${correct_ans ? 'var(--green)' : 'var(--red)'}">${correct_ans ? '✓ Correct' : '✗ Incorrect'}</span>
      </div>
      <div class="review-body">
        ${!correct_ans ? `
        <div class="wrong-ans">Applicant chose: <strong>${q.choices[state.answers[idx]] || 'No answer'}</strong></div>
        <div class="correct-ans">Correct answer: <strong>${q.choices[q.correct]}</strong></div>` : ''}
        <div style="font-size:12px;color:var(--dark);margin-top:8px;line-height:1.6"><strong>Why:</strong> ${q.explanation}</div>
        ${q.hrFlag && !correct_ans ? `<div class="flag-box">🚨 HR FLAG: ${q.hrFlag}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-logo">📊</div>
      <div><div class="hdr-title">Assessment Complete — ${a.role}</div><div class="hdr-sub">Safe Haven Children's Home Foundation, Inc.</div></div>
    </div>
  </div>
  <div class="results-screen">
    <div class="result-header">
      <div style="font-size:13px;opacity:0.8;letter-spacing:0.5px">ASSESSMENT RESULT</div>
      <div class="result-score" style="color:${color}">${pct}%</div>
      <div class="result-label" style="color:${color}">${label}</div>
      <div class="result-sub">${desc}</div>
    </div>
    <div class="result-grid">
      <div class="result-stat"><div class="stat-num">${correct}/${total}</div><div class="stat-lbl">MC Correct</div></div>
      <div class="result-stat"><div class="stat-num">${pct}%</div><div class="stat-lbl">MC Score</div></div>
      <div class="result-stat"><div class="stat-num">${minsUsed}m ${secsUsed}s</div><div class="stat-lbl">Time Used</div></div>
      <div class="result-stat"><div class="stat-num" style="color:${hasHRFlags?'var(--red)':'var(--green)'}">${hasHRFlags?'⚠️ Yes':'✓ None'}</div><div class="stat-lbl">HR Flags</div></div>
    </div>
    ${hasHRFlags ? `<div style="background:var(--redL);border-left:4px solid var(--red);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--dark)"><strong>🚨 HR Flags Detected.</strong> One or more answers suggest a potential child-safety concern. Jackson must review the flagged answers below before making any interview decision. Escalate to the Executive Director if any safeguarding flag is present.</div>` : ''}
    <div style="background:#ECFDF5;border:1px solid #1A6B3C44;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#1A6B3C;display:flex;gap:8px;align-items:flex-start">
      <span>✅</span>
      <div><strong>Results automatically emailed</strong> to Amy and Jackson at Safe Haven HR. They will review your results and contact you within 3–5 business days.</div>
    </div>
    <div class="hr-note" style="margin-bottom:20px">
      <strong>📋 For HR (Jackson) — How to Use This Result:</strong><br><br>
      <strong>MC Score (${pct}%):</strong> This is an objective competency indicator. Use it as one data point alongside the pre-screen written responses, reference checks, and interviews.<br><br>
      <strong>Written Answer:</strong> The writing section requires human review — it cannot be automatically scored. Evaluate it for clarity, specificity, professional language, and whether the applicant used the child's actual words in quotes.<br><br>
      <strong>HR Flags:</strong> Any question marked as an HR flag — especially safeguarding-related wrong answers — must be reviewed carefully. A wrong answer on a safeguarding question is more significant than a wrong answer on a numeracy question.<br><br>
      <strong>This assessment is one input among many.</strong> It does not replace interviews, reference checks, or the ED's final decision.
    </div>
    <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px">Full Review — Every Question</div>
    ${reviewCards}
  </div>`;
}

function renderTimeout() {
  const a = ASSESSMENTS[state.role];
  const { correct, total, pct } = calculateScore();
  return `
  <div class="hdr"><div class="hdr-top"><div class="hdr-logo">⏰</div><div><div class="hdr-title">Time's Up</div><div class="hdr-sub">${a.role} Assessment</div></div></div></div>
  <div class="timeout-screen">
    <div class="timeout-icon">⏰</div>
    <div style="font-size:20px;font-weight:800;color:var(--navy);margin-bottom:10px">Time Limit Reached</div>
    <div style="font-size:13px;color:var(--gray);line-height:1.7;max-width:400px;margin:0 auto 24px">
      The ${a.totalMinutes}-minute time limit has been reached. Answers recorded up to this point have been saved. Safe Haven HR will review your results.
    </div>
    <div style="background:var(--white);border-radius:14px;padding:20px;border:1px solid var(--grayL);margin-bottom:20px;text-align:center">
      <div style="font-size:32px;font-weight:800;color:var(--navy)">${correct}/${total}</div>
      <div style="font-size:13px;color:var(--gray);margin-top:4px">Questions answered correctly (MC)</div>
    </div>
    <div style="font-size:13px;color:var(--gray)">Safe Haven HR will contact you via Messenger or the number you provided.</div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
// HANDLERS
// ════════════════════════════════════════════════════════════════
function attachHandlers() {
  // Radio changes
  document.querySelectorAll('input[type=radio]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      state.answers[state.currentQ] = parseInt(e.target.value);
      updateNextBtn();
    });
  });

  // Textarea changes
  const ta = document.getElementById('writing-answer');
  if (ta) {
    ta.addEventListener('input', (e) => {
      state.answers[state.currentQ] = e.target.value;
      const wc = e.target.value.split(/\s+/).filter(Boolean).length;
      const minW = ASSESSMENTS[state.role].questions[state.currentQ].minWords;
      const wcel = document.getElementById('word-count');
      if (wcel) wcel.textContent = `${wc} words ${wc >= minW ? '✓' : `(minimum ${minW})`}`;
      updateNextBtn();
    });
  }
}

function updateNextBtn() {
  const btn = document.querySelector('.nav-next');
  if (!btn) return;
  const q = ASSESSMENTS[state.role].questions[state.currentQ];
  const isWriting = q.type === 'writing';
  const writingOk = isWriting && (state.answers[state.currentQ] || '').split(/\s+/).filter(Boolean).length >= q.minWords;
  const answered = state.answers[state.currentQ] !== undefined;
  btn.disabled = isWriting ? !writingOk : !answered;
}

function selectRole(role) {
  state.role = role;
  state.screen = 'intro';
  render();
}

function startWithName() {
  const nameEl = document.getElementById('applicant-name');
  const contactEl = document.getElementById('applicant-contact');
  if (!nameEl || !nameEl.value.trim()) {
    alert('Please enter your full name before starting.');
    return;
  }
  applicantName = nameEl.value.trim();
  applicantEmail = contactEl ? contactEl.value.trim() : '';
  startAssessment();
}

function startAssessment() {
  state.screen = 'question';
  state.currentQ = 0;
  state.answers = {};
  render();
  startTimer(ASSESSMENTS[state.role].totalMinutes);
}

function nextQ() {
  const total = ASSESSMENTS[state.role].questions.length;
  if (state.currentQ < total - 1) {
    state.currentQ++;
    render();
  } else {
    clearInterval(state.timerInterval);
    state.screen = 'results';
    render();
    // Email results automatically to Amy and Jackson
    emailResults();
  }
}

function prevQ() {
  if (state.currentQ > 0) {
    state.currentQ--;
    render();
  }
}

// ════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
